<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twi Vocabulary Quiz | Speak Ghana</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #FDF8F2 0%, #F5E6D3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .quiz-container {
            max-width: 650px;
            width: 100%;
            background: white;
            border-radius: 40px;
            padding: 2rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            text-align: center;
        }
        h1 { color: #2A9D8F; margin-bottom: 0.5rem; font-size: 1.8rem; }
        .subtitle { color: #666; margin-bottom: 2rem; font-size: 0.9rem; }
        .question-card {
            background: linear-gradient(135deg, #2A9D8F, #1f7a6e);
            border-radius: 30px;
            padding: 2rem;
            margin-bottom: 2rem;
            color: white;
        }
        .question-emoji {
            font-size: 5rem;
            display: block;
            margin-bottom: 1rem;
        }
        .question-text {
            font-size: 1.2rem;
            font-weight: 500;
        }
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .option-btn {
            background: #FDF8F2;
            border: 2px solid #2A9D8F;
            border-radius: 60px;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: monospace;
        }
        .option-btn:hover { background: #2A9D8F; color: white; transform: translateY(-3px); }
        .option-btn.correct { background: #2ecc71; color: white; pointer-events: none; }
        .option-btn.wrong { background: #e74c3c; color: white; pointer-events: none; }
        .option-btn.disabled { pointer-events: none; opacity: 0.6; }
        .next-btn {
            background: #2A9D8F;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .next-btn:disabled { background: #ccc; cursor: not-allowed; }
        .score-area {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            padding: 0.5rem 1rem;
            background: #FDF8F2;
            border-radius: 60px;
        }
        .progress-bar {
            margin: 1rem 0;
            background: #eee;
            border-radius: 20px;
            height: 8px;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #2A9D8F, #D4A373);
            transition: width 0.3s;
        }
        .feedback { margin-bottom: 1rem; font-size: 0.9rem; }
        .results { text-align: center; }
        .final-score { font-size: 3rem; font-weight: bold; color: #2A9D8F; margin: 1rem 0; }
        .hide { display: none; }
        @media (max-width: 600px) {
            .quiz-container { padding: 1.5rem; }
            .options-grid { grid-template-columns: 1fr; }
            .question-emoji { font-size: 3.5rem; }
        }
    </style>
</head>
<body>
    <div class="quiz-container" id="quizContainer">
        <h1>📸 Twi Vocabulary Quiz</h1>
        <p class="subtitle">Look at the picture, choose the correct Twi word</p>

        <div id="gameArea">
            <div class="question-card">
                <span class="question-emoji" id="questionEmoji">🐶</span>
                <div class="question-text" id="questionText">What is this in Twi?</div>
            </div>

            <div class="options-grid" id="optionsGrid"></div>

            <div class="score-area">
                <span>⭐ Score: <span id="scoreDisplay">0</span></span>
                <span id="counterDisplay">Question 1 / 10</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="feedback" id="feedback"></div>
            <button class="next-btn" id="nextBtn" disabled>Next Question →</button>
        </div>

        <div id="resultsArea" class="results hide">
            <div class="final-score" id="finalScore">0 / 10</div>
            <p id="resultMessage"></p>
            <button id="restartBtn" class="next-btn" style="margin-top: 1rem;">🔄 Play Again</button>
        </div>
    </div>

    <script>
        // Vocabulary from your vowel sound chart
        const vocabulary = [
            // From your list - Animals & Food
            { emoji: "💰", english: "money", twi: "sika" },
            { emoji: "❓", english: "ask", twi: "bisa" },
            { emoji: "🍽️", english: "eat", twi: "didi" },
            { emoji: "🔪", english: "knife", twi: "sekan" },
            { emoji: "🚶", english: "walk", twi: "nante" },
            { emoji: "🧕", english: "headwrap", twi: "duku" },
            { emoji: "🍲", english: "banku", twi: "banku" },
            { emoji: "🌊", english: "ocean", twi: "ɛpo" },
            { emoji: "🎵", english: "songs", twi: "nnwom" },
            { emoji: "🏠", english: "house", twi: "efie" },
            { emoji: "🌍", english: "world", twi: "ewiase" },
            { emoji: "🏢", english: "building", twi: "ɛdan" },
            { emoji: "😴", english: "tiredness", twi: "ɔbrɛ" },
            { emoji: "💀", english: "death", twi: "owuo" },
            { emoji: "🐑", english: "sheep", twi: "odwan" },
            { emoji: "❤️", english: "love", twi: "ɔdɔ" },
            { emoji: "📅", english: "tomorrow", twi: "ɔkyena" },
            { emoji: "👁️", english: "eye", twi: "ani" },
            { emoji: "🌽", english: "corn", twi: "aburo" },
            { emoji: "🦯", english: "stick", twi: "abaa" },
            { emoji: "🦔", english: "animal", twi: "aboa" }
        ];

        let currentQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let answered = false;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function getRandomQuestions() {
            const shuffled = shuffleArray([...vocabulary]);
            return shuffled.slice(0, 10);
        }

        function generateOptions(correctWord) {
            const otherWords = vocabulary.filter(v => v.twi !== correctWord).map(v => v.twi);
            const shuffledOthers = shuffleArray([...otherWords]);
            const wrong = shuffledOthers.slice(0, 3);
            const options = [...wrong, correctWord];
            return shuffleArray(options);
        }

        function loadQuestion() {
            const q = currentQuestions[currentIndex];
            if (!q) return;
            
            document.getElementById('questionEmoji').textContent = q.emoji;
            document.getElementById('questionText').innerHTML = `What is <strong>${q.english}</strong> in Twi?`;
            
            const options = generateOptions(q.twi);
            const optionsGrid = document.getElementById('optionsGrid');
            optionsGrid.innerHTML = '';
            
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.onclick = () => checkAnswer(opt, q.twi, btn);
                optionsGrid.appendChild(btn);
            });
            
            answered = false;
            document.getElementById('nextBtn').disabled = true;
            document.getElementById('feedback').innerHTML = '';
            document.getElementById('feedback').style.color = '#666';
            document.getElementById('counterDisplay').textContent = `Question ${currentIndex + 1} / ${currentQuestions.length}`;
            const progress = (currentIndex / currentQuestions.length) * 100;
            document.getElementById('progressFill').style.width = `${progress}%`;
        }

        function checkAnswer(selected, correct, buttonElement) {
            if (answered) return;
            answered = true;
            
            const allButtons = document.querySelectorAll('.option-btn');
            
            if (selected === correct) {
                buttonElement.classList.add('correct');
                score++;
                document.getElementById('feedback').innerHTML = '✅ Correct!';
                document.getElementById('feedback').style.color = '#2ecc71';
            } else {
                buttonElement.classList.add('wrong');
                document.getElementById('feedback').innerHTML = `❌ Wrong! The correct answer is "${correct}".`;
                document.getElementById('feedback').style.color = '#e74c3c';
                
                allButtons.forEach(btn => {
                    if (btn.textContent === correct) {
                        btn.classList.add('correct');
                    }
                });
            }
            
            allButtons.forEach(btn => {
                btn.classList.add('disabled');
                btn.disabled = true;
            });
            
            document.getElementById('nextBtn').disabled = false;
            document.getElementById('scoreDisplay').textContent = score;
        }

        function nextQuestion() {
            if (!answered) return;
            currentIndex++;
            if (currentIndex < currentQuestions.length) {
                loadQuestion();
            } else {
                endGame();
            }
        }

        function endGame() {
            document.getElementById('gameArea').classList.add('hide');
            document.getElementById('resultsArea').classList.remove('hide');
            const total = currentQuestions.length;
            document.getElementById('finalScore').textContent = `${score} / ${total}`;
            
            let message = '';
            if (score === total) message = '🎉 Perfect! You know all the vocabulary!';
            else if (score >= 8) message = '👏 Great job! Practice the ones you missed.';
            else if (score >= 6) message = '💪 Good effort! Play again to improve.';
            else message = '🌱 Keep practicing! Try again to learn the words.';
            document.getElementById('resultMessage').textContent = message;
            
            gtag('event', 'game_complete', {
                'event_category': 'engagement',
                'event_label': 'vocabulary_quiz',
                'score': score,
                'total': total
            });
        }

        function restartGame() {
            currentQuestions = getRandomQuestions();
            currentIndex = 0;
            score = 0;
            answered = false;
            document.getElementById('scoreDisplay').textContent = '0';
            document.getElementById('gameArea').classList.remove('hide');
            document.getElementById('resultsArea').classList.add('hide');
            loadQuestion();
            gtag('event', 'game_restart', { 'event_category': 'engagement', 'event_label': 'vocabulary_quiz' });
        }

        function init() {
            currentQuestions = getRandomQuestions();
            currentIndex = 0;
            score = 0;
            answered = false;
            document.getElementById('scoreDisplay').textContent = '0';
            loadQuestion();
            document.getElementById('nextBtn').onclick = nextQuestion;
            document.getElementById('restartBtn').onclick = restartGame;
            gtag('event', 'game_start', { 'event_category': 'engagement', 'event_label': 'vocabulary_quiz' });
        }
        
        init();
    </script>
</body>
</html>
