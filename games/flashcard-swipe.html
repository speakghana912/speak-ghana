<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Flashcard Swipe | Speak Ghana Vocabulary Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #D4A373;
            --green: #2A9D8F;
            --red: #E76F51;
            --black: #1E1E1E;
            --cream: #FDF8F2;
            --white: #FFFFFF;
            --gray: #666666;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--cream), #fff5e8);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .game-container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 48px;
            padding: 1.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .game-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .game-header h1 {
            color: var(--green);
            font-size: 1.8rem;
            margin-bottom: 0.3rem;
        }

        .game-header p {
            color: var(--gray);
            font-size: 0.85rem;
        }

        /* Score Bar */
        .score-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--cream);
            padding: 0.8rem 1rem;
            border-radius: 60px;
            margin-bottom: 1.5rem;
        }

        .score-badge {
            background: var(--green);
            color: white;
            padding: 0.3rem 1rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .cards-left {
            color: var(--gray);
            font-size: 0.8rem;
        }

        /* Flashcard */
        .flashcard-container {
            perspective: 1000px;
            margin-bottom: 1.5rem;
            cursor: pointer;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 400px;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            border-radius: 32px;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .front {
            background: linear-gradient(135deg, var(--green), #1f7a6e);
            color: white;
            transform: rotateY(0deg);
        }

        .back {
            background: linear-gradient(135deg, var(--gold), #c49a6c);
            color: var(--black);
            transform: rotateY(180deg);
        }

        .twi-word {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: 2px;
        }

        .meaning {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .icon-large {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .audio-icon {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.2rem;
        }

        .audio-icon:hover {
            background: rgba(255,255,255,0.4);
            transform: scale(1.05);
        }

        .flip-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.3);
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-size: 0.7rem;
            color: white;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .swipe-btn {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .know-btn {
            background: var(--green);
            color: white;
        }

        .know-btn:hover {
            transform: translateY(-3px);
            background: #1f7a6e;
            box-shadow: 0 5px 15px rgba(42,157,143,0.4);
        }

        .dontknow-btn {
            background: var(--red);
            color: white;
        }

        .dontknow-btn:hover {
            transform: translateY(-3px);
            background: #c95a3e;
            box-shadow: 0 5px 15px rgba(231,111,81,0.4);
        }

        /* Results Screen */
        .results-screen {
            text-align: center;
        }

        .results-stats {
            background: var(--cream);
            border-radius: 32px;
            padding: 2rem;
            margin: 1.5rem 0;
        }

        .results-score {
            font-size: 3rem;
            font-weight: 800;
            color: var(--green);
        }

        .weak-words {
            background: var(--cream);
            border-radius: 24px;
            padding: 1.5rem;
            margin-top: 1rem;
        }

        .weak-word-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem;
            border-bottom: 1px solid #eee;
        }

        .weak-word-item:last-child {
            border-bottom: none;
        }

        .weak-twi {
            font-weight: 700;
            color: var(--green);
        }

        .weak-meaning {
            color: var(--gray);
            font-size: 0.85rem;
        }

        .practice-btn {
            background: var(--gold);
            color: var(--black);
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
            width: 100%;
        }

        .practice-btn:hover {
            background: var(--green);
            color: white;
            transform: translateY(-2px);
        }

        .reset-btn {
            background: transparent;
            border: 1px solid var(--gray);
            color: var(--gray);
            padding: 0.8rem;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 0.8rem;
        }

        .reset-btn:hover {
            background: var(--red);
            border-color: var(--red);
            color: white;
        }

        @media (max-width: 500px) {
            .flashcard {
                height: 350px;
            }
            .twi-word {
                font-size: 2.2rem;
            }
            .meaning {
                font-size: 1.4rem;
            }
            .icon-large {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer">
        <!-- Dynamic content -->
    </div>

    <script>
        // Vocabulary list
        const vocabularyData = [
            { twi: "sika", meaning: "money", icon: "💰", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/sika.m4a" },
            { twi: "bisa", meaning: "ask", icon: "❓", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/bisa.m4a" },
            { twi: "didi", meaning: "eat", icon: "🍽️", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/didi.m4a" },
            { twi: "sekan", meaning: "knife", icon: "🔪", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/sekan.m4a" },
            { twi: "nante", meaning: "walk", icon: "🚶", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/nante.m4a" },
            { twi: "duku", meaning: "headwrap", icon: "🧕", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/duku.m4a" },
            { twi: "banku", meaning: "banku (food)", icon: "🍲", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/banku.m4a" },
            { twi: "ɛpo", meaning: "ocean", icon: "🌊", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/ɛpo.m4a" },
            { twi: "nnwom", meaning: "songs", icon: "🎵", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/nnwom.m4a" },
            { twi: "efie", meaning: "house", icon: "🏠", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/efie.m4a" },
            { twi: "ewiase", meaning: "world", icon: "🌍", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/ewiase.m4a" },
            { twi: "ɛdan", meaning: "building", icon: "🏢", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/ɛdan.m4a" },
            { twi: "ɔbrɛ", meaning: "tiredness", icon: "😫", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/ɔbrɛ.m4a" },
            { twi: "owuo", meaning: "death", icon: "💀", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/owuo.m4a" },
            { twi: "odwan", meaning: "sheep", icon: "🐑", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/odwan.m4a" },
            { twi: "ɔdɔ", meaning: "love", icon: "❤️", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/ɔdɔ.m4a" },
            { twi: "ɔkyena", meaning: "tomorrow", icon: "📅", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/ɔkyena.m4a" },
            { twi: "ani", meaning: "eye", icon: "👁️", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/ani.m4a" },
            { twi: "aburo", meaning: "corn", icon: "🌽", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/aburo.m4a" },
            { twi: "aboa", meaning: "animal", icon: "🐘", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/aboa.m4a" },
            { twi: "abaa", meaning: "stick", icon: "🪵", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/abaa.m4a" },
            { twi: "din", meaning: "name", icon: "🏷️", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/din.m4a" },
            { twi: "kanea", meaning: "lamp", icon: "💡", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/kanea.m4a" },
            { twi: "nana", meaning: "grandparent", icon: "👵", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/nana.m4a" },
            { twi: "praeɛ", meaning: "broom", icon: "🧹", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/praeɛ.m4a" },
            { twi: "rɔba", meaning: "rubber", icon: "🧽", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/rɔba.m4a" },
            { twi: "waduro", meaning: "mortar", icon: "🫕", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/waduro.m4a" },
            { twi: "yoma", meaning: "camel", icon: "🐫", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/yoma.m4a" }
        ];

        let currentCards = [];
        let currentIndex = 0;
        let knownWords = [];
        let unknownWords = [];
        let isFlipped = false;
        let currentAudio = null;

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function playAudio(url) {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }
            currentAudio = new Audio(url);
            currentAudio.play().catch(e => console.log('Audio error:', e));
        }

        function flipCard() {
            const flashcard = document.querySelector('.flashcard');
            if (flashcard) {
                flashcard.classList.toggle('flipped');
                isFlipped = !isFlipped;
            }
        }

        function markAsKnown() {
            if (currentIndex >= currentCards.length) return;
            
            const currentCard = currentCards[currentIndex];
            knownWords.push(currentCard);
            
            currentIndex++;
            
            if (currentIndex < currentCards.length) {
                // Reset flip state for next card
                const flashcard = document.querySelector('.flashcard');
                if (flashcard && isFlipped) {
                    flashcard.classList.remove('flipped');
                    isFlipped = false;
                }
                renderCard();
                updateScoreBar();
            } else {
                // Game finished
                showResults();
            }
        }

        function markAsUnknown() {
            if (currentIndex >= currentCards.length) return;
            
            const currentCard = currentCards[currentIndex];
            unknownWords.push(currentCard);
            
            currentIndex++;
            
            if (currentIndex < currentCards.length) {
                // Reset flip state for next card
                const flashcard = document.querySelector('.flashcard');
                if (flashcard && isFlipped) {
                    flashcard.classList.remove('flipped');
                    isFlipped = false;
                }
                renderCard();
                updateScoreBar();
            } else {
                // Game finished
                showResults();
            }
        }

        function updateScoreBar() {
            const remaining = currentCards.length - currentIndex;
            const scoreBar = document.getElementById('scoreBar');
            if (scoreBar) {
                scoreBar.innerHTML = `
                    <div class="score-bar">
                        <span class="score-badge">✅ Known: ${knownWords.length}</span>
                        <span class="cards-left">📚 Remaining: ${remaining}</span>
                        <span class="score-badge" style="background: var(--red);">❌ Need Practice: ${unknownWords.length}</span>
                    </div>
                `;
            }
        }

        function renderCard() {
            const card = currentCards[currentIndex];
            const gameArea = document.getElementById('gameArea');
            
            gameArea.innerHTML = `
                <div class="flashcard-container" onclick="flipCard()">
                    <div class="flashcard">
                        <div class="front">
                            <div class="icon-large">${card.icon}</div>
                            <div class="twi-word">${card.twi}</div>
                            <div class="flip-hint">👆 Tap to flip</div>
                            <div class="audio-icon" onclick="event.stopPropagation(); playAudio('${card.audio}')">
                                🔊
                            </div>
                        </div>
                        <div class="back">
                            <div class="icon-large">${card.icon}</div>
                            <div class="meaning">${card.meaning}</div>
                            <div class="flip-hint">👆 Tap to flip back</div>
                            <div class="audio-icon" onclick="event.stopPropagation(); playAudio('${card.audio}')">
                                🔊
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="action-buttons">
                    <button class="swipe-btn know-btn" onclick="markAsKnown()">
                        ✅ I Know This
                    </button>
                    <button class="swipe-btn dontknow-btn" onclick="markAsUnknown()">
                        ❌ Need Practice
                    </button>
                </div>
            `;
        }

        function showResults() {
            const gameContainer = document.getElementById('gameContainer');
            const totalCards = knownWords.length + unknownWords.length;
            const scorePercent = Math.round((knownWords.length / totalCards) * 100);
            
            let weakWordsHtml = '';
            if (unknownWords.length > 0) {
                weakWordsHtml = `
                    <div class="weak-words">
                        <h3 style="margin-bottom: 1rem; color: var(--red);">📝 Words to Practice</h3>
                        ${unknownWords.map(word => `
                            <div class="weak-word-item">
                                <div>
                                    <span class="weak-twi">${word.twi}</span>
                                    <span class="weak-meaning"> - ${word.meaning}</span>
                                </div>
                                <button class="practice-btn-small" style="background: var(--gold); border: none; padding: 0.3rem 0.8rem; border-radius: 50px; cursor: pointer; font-size: 0.7rem;" onclick="playAudio('${word.audio}')">🔊</button>
                            </div>
                        `).join('')}
                        <button class="practice-btn" onclick="resetGameWithWeakWords()">
                            🔄 Practice Only Weak Words (${unknownWords.length} cards)
                        </button>
                    </div>
                `;
            }
            
            gameContainer.innerHTML = `
                <div class="game-header">
                    <h1>📊 Session Complete!</h1>
                    <p>Your vocabulary check results</p>
                </div>
                
                <div class="results-stats">
                    <div class="results-score">${scorePercent}%</div>
                    <p style="margin-top: 0.5rem;">You know <strong>${knownWords.length}</strong> out of <strong>${totalCards}</strong> words</p>
                    <div style="margin-top: 1rem;">
                        <span style="background: var(--green); color: white; padding: 0.2rem 0.8rem; border-radius: 50px; font-size: 0.8rem;">✅ Known: ${knownWords.length}</span>
                        <span style="background: var(--red); color: white; padding: 0.2rem 0.8rem; border-radius: 50px; font-size: 0.8rem; margin-left: 0.5rem;">❌ Practice: ${unknownWords.length}</span>
                    </div>
                </div>
                
                ${weakWordsHtml}
                
                <button class="reset-btn" onclick="startNewGame()">
                    🔄 New Game (All Words)
                </button>
            `;
        }

        function startNewGame() {
            currentCards = shuffleArray([...vocabularyData]);
            currentIndex = 0;
            knownWords = [];
            unknownWords = [];
            isFlipped = false;
            
            renderFullGame();
        }

        function resetGameWithWeakWords() {
            if (unknownWords.length === 0) {
                startNewGame();
                return;
            }
            currentCards = shuffleArray([...unknownWords]);
            currentIndex = 0;
            knownWords = [];
            unknownWords = [];
            isFlipped = false;
            
            renderFullGame();
        }

        function renderFullGame() {
            const gameContainer = document.getElementById('gameContainer');
            gameContainer.innerHTML = `
                <div class="game-header">
                    <h1>📇 Flashcard Swipe</h1>
                    <p>Tap card to flip • Mark words you know</p>
                </div>
                
                <div id="scoreBar">
                    <div class="score-bar">
                        <span class="score-badge">✅ Known: 0</span>
                        <span class="cards-left">📚 Remaining: ${currentCards.length}</span>
                        <span class="score-badge" style="background: var(--red);">❌ Need Practice: 0</span>
                    </div>
                </div>
                
                <div id="gameArea"></div>
            `;
            
            updateScoreBar();
            renderCard();
        }

        // Initialize the game
        startNewGame();
    </script>
</body>
</html>
