<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Number Pop | Twi Numbers Game | Speak Ghana</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#2A9D8F,#1f7a6e);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:2rem;}
        .game-container{background:white;border-radius:40px;max-width:900px;width:100%;padding:2rem;box-shadow:0 30px 50px rgba(0,0,0,0.2);text-align:center;}
        .game-header h1{color:#2A9D8F;}
        .score-timer{display:flex;justify-content:space-between;background:#FDF8F2;padding:1rem;border-radius:20px;margin:1rem 0;}
        .score-box,.timer-box,.level-box{background:white;padding:0.5rem 1rem;border-radius:50px;font-weight:600;}
        .question-area{background:#1a1a1a;border-radius:30px;padding:2rem;margin:1.5rem 0;}
        .question-number{font-size:3rem;color:white;font-weight:800;}
        .options-area{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin:1.5rem 0;}
        .option-btn{background:#FDF8F2;border:2px solid #e2e8f0;border-radius:16px;padding:1rem;font-size:1.2rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
        .option-btn:hover{background:#2A9D8F;color:white;transform:scale(1.05);}
        .feedback{padding:1rem;border-radius:16px;margin:1rem 0;display:none;}
        .feedback.correct{display:block;background:#d4f5ef;color:#1f7a6e;}
        .feedback.incorrect{display:block;background:#fde5dd;color:#E76F51;}
        .next-btn{background:#D4A373;color:#1E1E1E;border:none;padding:1rem;border-radius:50px;font-weight:600;cursor:pointer;width:100%;display:none;}
        .next-btn.show{display:block;}
        .game-end{display:none;text-align:center;}
        .game-end.show{display:block;}
        .restart-btn{background:#2A9D8F;color:white;border:none;padding:1rem 2rem;border-radius:50px;cursor:pointer;margin-top:1rem;}
        @media (max-width:600px){.options-area{grid-template-columns:repeat(2,1fr);}}
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-header"><h1>🎈 Number Pop</h1><p>Pop the balloon with the correct Twi number!</p></div>
    <div class="score-timer"><div class="score-box">🏆 Score: <span id="score">0</span></div><div class="level-box">⭐ Level: <span id="level">1</span></div></div>
    <div class="question-area"><div class="question-number" id="questionNumber">?</div><p style="color:rgba(255,255,255,0.7);margin-top:0.5rem;">Choose the correct Twi number</p></div>
    <div class="options-area" id="optionsArea"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn">Next Number →</button>
    <div class="game-end" id="gameEnd"><h2>🎉 Game Complete! 🎉</h2><p>Final score:</p><div class="final-score" id="finalScore">0</div><button class="restart-btn" id="restartBtn">Play Again ↻</button></div>
</div>
<script>
const numbers=[
{eng:1,twi:'baako'},{eng:2,twi:'mmienu'},{eng:3,twi:'mmiɛnsa'},{eng:4,twi:'nnan'},{eng:5,twi:'nnum'},{eng:6,twi:'nsia'},{eng:7,twi:'nson'},{eng:8,twi:'nwɔtwe'},{eng:9,twi:'nkron'},{eng:10,twi:'du'},{eng:11,twi:'du baako'},{eng:12,twi:'du mmienu'},{eng:13,twi:'du mmiɛnsa'},{eng:14,twi:'du ɛnan'},{eng:15,twi:'du ɛnum'},{eng:16,twi:'du nsia'},{eng:17,twi:'du nson'},{eng:18,twi:'du nwɔtwe'},{eng:19,twi:'du nkron'},{eng:20,twi:'aduonu'}];
let currentQuestions=[],currentIndex=0,score=0,level=1,answered=false;
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function selectQuestions(){let levelQuestions;if(level===1)levelQuestions=numbers.slice(0,5);else if(level===2)levelQuestions=numbers.slice(5,10);else if(level===3)levelQuestions=numbers.slice(10,15);else levelQuestions=numbers.slice(15,20);return shuffle([...levelQuestions]).slice(0,5);}
function loadQuestion(){answered=false;const q=currentQuestions[currentIndex];document.getElementById('questionNumber').innerHTML=q.eng;document.getElementById('feedback').className='feedback';document.getElementById('feedback').style.display='none';document.getElementById('nextBtn').classList.remove('show');const allOptions=[q.twi];while(allOptions.length<4){const randomNum=numbers[Math.floor(Math.random()*numbers.length)];if(!allOptions.includes(randomNum.twi))allOptions.push(randomNum.twi);}const shuffledOpts=shuffle([...allOptions]);const container=document.getElementById('optionsArea');container.innerHTML='';shuffledOpts.forEach(opt=>{const btn=document.createElement('button');btn.className='option-btn';btn.innerText=opt;btn.onclick=()=>checkAnswer(opt);container.appendChild(btn);});}
function checkAnswer(selected){if(answered)return;answered=true;const q=currentQuestions[currentIndex];const isCorrect=selected===q.twi;if(isCorrect){score++;document.getElementById('score').innerText=score;showFeedback(true,'✅ Correct! '+q.eng+' = '+q.twi);}else{showFeedback(false,'❌ Incorrect! '+q.eng+' = '+q.twi);}document.getElementById('nextBtn').classList.add('show');}
function showFeedback(isCorrect,msg){const fd=document.getElementById('feedback');fd.innerText=msg;fd.className=isCorrect?'feedback correct':'feedback incorrect';fd.style.display='block';}
function nextQuestion(){currentIndex++;if(currentIndex<currentQuestions.length){loadQuestion();}else{if(level<4){level++;document.getElementById('level').innerText=level;currentQuestions=selectQuestions();currentIndex=0;score=0;document.getElementById('score').innerText='0';loadQuestion();}else{endGame();}}}
function endGame(){document.getElementById('finalScore').innerHTML=score;document.querySelector('.game-container > div:not(.game-end)').style.display='none';document.getElementById('gameEnd').classList.add('show');}
function restartGame(){score=0;level=1;currentIndex=0;document.getElementById('score').innerText='0';document.getElementById('level').innerText='1';document.querySelector('.game-container > div:not(.game-end)').style.display='block';document.getElementById('gameEnd').classList.remove('show');currentQuestions=selectQuestions();loadQuestion();}
document.getElementById('nextBtn').addEventListener('click',nextQuestion);
document.getElementById('restartBtn').addEventListener('click',restartGame);
currentQuestions=selectQuestions();loadQuestion();
</script>
</body>
</html>
