<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Vocabulary Wheel | Speak Ghana</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a1a, #2A9D8F);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .game-container {
            max-width: 1400px;
            width: 100%;
            background: rgba(255,255,255,0.95);
            border-radius: 48px;
            padding: 2rem;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }

        .speak-ghana-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .speak-ghana-header h1 {
            color: #2A9D8F;
            font-size: 1.8rem;
        }

        .speak-ghana-header h1 span {
            color: #D4A373;
        }

        .speak-ghana-header p {
            color: #666;
            font-size: 0.85rem;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 2rem;
            font-size: 0.9rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #f0f0f0;
        }

        .game-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .wheel-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .wheel-wrapper {
            position: relative;
            display: inline-block;
        }

        canvas {
            width: 100%;
            height: auto;
            background: white;
            border-radius: 50%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.3s;
        }

        canvas:hover {
            transform: scale(1.02);
        }

        .spin-btn {
            background: linear-gradient(135deg, #E76F51, #c95a3e);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(231,111,81,0.3);
        }

        .spin-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(231,111,81,0.4);
        }

        .spin-btn:active {
            transform: translateY(0);
        }

        .spin-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .counter {
            font-size: 0.9rem;
            color: #999;
            margin-top: 1rem;
        }

        .result-section {
            background: linear-gradient(135deg, #FDF8F2, #fff5e8);
            border-radius: 32px;
            padding: 2rem;
            text-align: center;
        }

        .result-word {
            font-size: 3.5rem;
            font-weight: 800;
            color: #2A9D8F;
            margin: 1rem 0;
            background: white;
            padding: 1rem;
            border-radius: 24px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .result-meaning {
            font-size: 1.5rem;
            color: #E76F51;
            margin-bottom: 1rem;
        }

        .result-example {
            font-size: 1rem;
            color: #666;
            font-style: italic;
            margin-bottom: 1rem;
            padding: 1rem;
            background: white;
            border-radius: 16px;
        }

        .spin-history {
            margin-top: 1rem;
            text-align: left;
            border-top: 1px solid #eee;
            padding-top: 1rem;
        }

        .spin-history h4 {
            color: #2A9D8F;
            margin-bottom: 0.5rem;
        }

        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            max-height: 120px;
            overflow-y: auto;
        }

        .history-badge {
            background: white;
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-size: 0.8rem;
            color: #2A9D8F;
            border: 1px solid #ddd;
        }

        .teacher-controls {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 2px dashed #ddd;
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .teacher-btn {
            background: #D4A373;
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s;
        }

        .teacher-btn:hover {
            background: #b8864e;
            transform: translateY(-2px);
        }

        .vocab-list {
            margin-top: 1.5rem;
            background: #f8f8f8;
            border-radius: 20px;
            padding: 1rem;
        }

        .vocab-list h4 {
            color: #2A9D8F;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .vocab-items {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .vocab-item {
            background: white;
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #ddd;
            color: #333;
        }

        .vocab-item:hover {
            background: #2A9D8F;
            color: white;
            border-color: #2A9D8F;
        }

        .music-toggle {
            background: #2A9D8F;
        }

        @media (max-width: 768px) {
            .game-layout {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            .result-word {
                font-size: 2rem;
            }
            .result-meaning {
                font-size: 1.2rem;
            }
            body {
                padding: 1rem;
            }
            .game-container {
                padding: 1rem;
            }
            .speak-ghana-header h1 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="speak-ghana-header">
            <h1>Speak <span>Ghana</span></h1>
            <p>by Richard Asiamah</p>
        </div>
        <div class="subtitle">
            🎡 Twi Vocabulary Wheel | Spin to learn and practice!
        </div>

        <div class="game-layout">
            <div class="wheel-section">
                <div class="wheel-wrapper">
                    <canvas id="wheelCanvas" width="500" height="500"></canvas>
                </div>
                <button class="spin-btn" id="spinBtn">🎲 SPIN THE WHEEL 🎲</button>
                <div class="counter" id="spinCounter">Spins this session: 0</div>
            </div>

            <div class="result-section">
                <div id="resultArea">
                    <div style="font-size: 0.9rem; color: #999;">🎯 Your Word</div>
                    <div class="result-word" id="resultWord">---</div>
                    <div class="result-meaning" id="resultMeaning">---</div>
                    <div class="result-example" id="resultExample">Click SPIN to start!</div>
                </div>
                <div class="spin-history">
                    <h4>📜 Recent Spins</h4>
                    <div class="history-list" id="historyList">
                        <span class="history-badge">Spin to begin</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="teacher-controls">
            <button class="teacher-btn" id="resetHistoryBtn">🔄 Reset History</button>
            <button class="teacher-btn music-toggle" id="musicToggleBtn">🎵 Music On</button>
        </div>

        <div class="vocab-list">
            <h4><span>📚</span> Today's Vocabulary (12 words)</h4>
            <div class="vocab-items" id="vocabListDisplay"></div>
        </div>
    </div>

    <script>
        // ============================================
        // CORRECT VOCABULARY WITH PROPER EXAMPLES
        // ============================================
        const vocabulary = [
            { word: "ɛpo", meaning: "sea", example: "Mekɔ ɛpo so" },
            { word: "ɛtwo", meaning: "hernia", example: "Ɛtwo yɛ no ya" },
            { word: "ɛta", meaning: "wooden mortar", example: "Ɛta no yɛ duru" },
            { word: "ɛdam", meaning: "madness", example: "Ɛdam no abɔ" },
            { word: "efie", meaning: "house / home", example: "Mekɔ efie" },
            { word: "esum", meaning: "darkness", example: "Esum no so" },
            { word: "edwam", meaning: "market", example: "Mekɔ edwam" },
            { word: "efin", meaning: "dirt / filth", example: "Efin no gu hɔ" },
            { word: "ankaa", meaning: "orange", example: "Mepɛ ankaa" },
            { word: "abaayewa", meaning: "girl", example: "Abaayewa no yɛ fɛ" },
            { word: "aseda", meaning: "thanks given", example: "Meda wo ase" },
            { word: "aboa", meaning: "animal", example: "Aboa no retu" }
        ];

        const colors = [
            '#E76F51', '#F4A261', '#E9C46A', '#2A9D8F', '#264653',
            '#E76F51', '#F4A261', '#E9C46A', '#2A9D8F', '#264653',
            '#D4A373', '#BC6C25'
        ];

        let currentRotation = 0;
        let spinning = false;
        let spinCount = 0;
        let spinHistory = [];

        let spinMusic = null;
        let musicEnabled = true;

        function initSpinMusic() {
            if (spinMusic !== null) return;
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                spinMusic = new AudioContext();
                const masterGain = spinMusic.createGain();
                masterGain.gain.value = 0.3;
                masterGain.connect(spinMusic.destination);
                spinMusic.masterGain = masterGain;
                spinMusic.isPlaying = false;
                spinMusic.oscillators = [];
            } catch (e) {
                spinMusic = null;
            }
        }

        function startSpinMusic() {
            if (!musicEnabled) return;
            if (!spinMusic) initSpinMusic();
            if (!spinMusic) return;
            
            if (spinMusic.state === 'suspended') {
                spinMusic.resume();
            }
            if (spinMusic.isPlaying) return;
            
            try {
                spinMusic.isPlaying = true;
                spinMusic.oscillators = [];
                
                const notes = [523.25, 587.33, 659.25, 783.99];
                let time = spinMusic.currentTime;
                
                for (let i = 0; i < 20; i++) {
                    const osc = spinMusic.createOscillator();
                    const gain = spinMusic.createGain();
                    const noteIndex = i % notes.length;
                    osc.frequency.value = notes[noteIndex] + (i * 2);
                    osc.type = 'sine';
                    gain.gain.value = 0.15;
                    gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.1);
                    osc.connect(gain);
                    gain.connect(spinMusic.masterGain);
                    osc.start(time);
                    osc.stop(time + 0.12);
                    spinMusic.oscillators.push(osc);
                    time += 0.08;
                }
                
                const padOsc = spinMusic.createOscillator();
                const padGain = spinMusic.createGain();
                padOsc.frequency.value = 261.63;
                padOsc.type = 'sine';
                padGain.gain.value = 0.08;
                padOsc.connect(padGain);
                padGain.connect(spinMusic.masterGain);
                padOsc.start();
                padOsc.stop(spinMusic.currentTime + 1.8);
                spinMusic.oscillators.push(padOsc);
                
            } catch (e) {
                spinMusic.isPlaying = false;
            }
        }

        function stopSpinMusic() {
            if (!spinMusic) return;
            if (!spinMusic.isPlaying) return;
            try {
                if (spinMusic.masterGain) {
                    spinMusic.masterGain.gain.linearRampToValueAtTime(0, spinMusic.currentTime + 0.3);
                }
                setTimeout(() => {
                    if (spinMusic.oscillators) {
                        spinMusic.oscillators.forEach(osc => {
                            try { osc.stop(); } catch(e) {}
                        });
                        spinMusic.oscillators = [];
                    }
                    if (spinMusic.masterGain) {
                        spinMusic.masterGain.gain.value = 0.3;
                    }
                    spinMusic.isPlaying = false;
                }, 300);
            } catch (e) {
                spinMusic.isPlaying = false;
            }
        }

        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const size = 500;
        canvas.width = size;
        canvas.height = size;

        const centerX = size / 2;
        const centerY = size / 2;
        const radius = size / 2 - 10;

        function drawWheel() {
            const segmentAngle = (Math.PI * 2) / vocabulary.length;
            
            for (let i = 0; i < vocabulary.length; i++) {
                const startAngle = i * segmentAngle + currentRotation;
                const endAngle = (i + 1) * segmentAngle + currentRotation;
                
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.fillStyle = colors[i % colors.length];
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + segmentAngle / 2);
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.font = 'bold 14px "Inter", sans-serif';
                ctx.fillStyle = 'white';
                const textX = radius * 0.65;
                ctx.fillText(vocabulary[i].word, textX, 0);
                ctx.restore();
            }
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, 30, 0, Math.PI * 2);
            ctx.fillStyle = '#1a1a1a';
            ctx.fill();
            ctx.fillStyle = '#D4A373';
            ctx.font = 'bold 20px "Inter", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🎡', centerX, centerY);
        }

        function getSelectedIndex() {
            const segmentAngle = (Math.PI * 2) / vocabulary.length;
            const pointerAngle = -Math.PI / 2;
            let rawAngle = pointerAngle - currentRotation;
            rawAngle = ((rawAngle % (Math.PI * 2)) + (Math.PI * 2)) % (Math.PI * 2);
            return Math.floor(rawAngle / segmentAngle) % vocabulary.length;
        }

        function updateDisplay(index) {
            const result = vocabulary[index];
            document.getElementById('resultWord').innerHTML = result.word;
            document.getElementById('resultMeaning').innerHTML = result.meaning;
            document.getElementById('resultExample').innerHTML = `📖 Example: "${result.example}"`;
        }

        function updateHistoryDisplay() {
            const historyList = document.getElementById('historyList');
            if (spinHistory.length === 0) {
                historyList.innerHTML = '<span class="history-badge">No spins yet</span>';
                return;
            }
            historyList.innerHTML = spinHistory.map(item => 
                `<span class="history-badge">${item}</span>`
            ).join('');
        }

        function spinWheel() {
            if (spinning) return;
            
            spinning = true;
            const spinBtn = document.getElementById('spinBtn');
            spinBtn.disabled = true;
            
            startSpinMusic();
            
            const spins = Math.floor(Math.random() * 10) + 8;
            const randomAngle = Math.random() * Math.PI * 2;
            const targetRotation = currentRotation + (spins * Math.PI * 2) + randomAngle;
            
            const duration = 2000;
            const startTime = performance.now();
            const startRotation = currentRotation;
            
            function animateSpin(now) {
                const elapsed = now - startTime;
                const progress = Math.min(1, elapsed / duration);
                const easeOut = 1 - Math.pow(1 - progress, 3);
                currentRotation = startRotation + (targetRotation - startRotation) * easeOut;
                drawWheel();
                
                if (progress < 1) {
                    requestAnimationFrame(animateSpin);
                } else {
                    currentRotation = targetRotation % (Math.PI * 2);
                    drawWheel();
                    stopSpinMusic();
                    
                    const index = getSelectedIndex();
                    updateDisplay(index);
                    
                    spinCount++;
                    document.getElementById('spinCounter').innerHTML = `Spins this session: ${spinCount}`;
                    
                    spinHistory.unshift(`${vocabulary[index].word} (${vocabulary[index].meaning})`);
                    if (spinHistory.length > 8) spinHistory.pop();
                    updateHistoryDisplay();
                    
                    spinning = false;
                    spinBtn.disabled = false;
                }
            }
            
            requestAnimationFrame(animateSpin);
        }

        function resetHistory() {
            spinCount = 0;
            spinHistory = [];
            document.getElementById('spinCounter').innerHTML = 'Spins this session: 0';
            updateHistoryDisplay();
            document.getElementById('resultWord').innerHTML = '---';
            document.getElementById('resultMeaning').innerHTML = '---';
            document.getElementById('resultExample').innerHTML = 'History reset! Spin the wheel!';
        }

        function toggleMusic() {
            musicEnabled = !musicEnabled;
            const btn = document.getElementById('musicToggleBtn');
            if (musicEnabled) {
                btn.innerHTML = '🎵 Music On';
                btn.style.background = '#2A9D8F';
            } else {
                btn.innerHTML = '🔇 Music Off';
                btn.style.background = '#666';
                stopSpinMusic();
            }
        }

        function jumpToWord(index) {
            if (spinning) return;
            const segmentAngle = (Math.PI * 2) / vocabulary.length;
            const targetSegmentCenter = (index * segmentAngle) + (segmentAngle / 2);
            currentRotation = (-Math.PI / 2) - targetSegmentCenter;
            currentRotation = currentRotation % (Math.PI * 2);
            drawWheel();
            updateDisplay(index);
        }

        function displayVocabularyList() {
            const container = document.getElementById('vocabListDisplay');
            container.innerHTML = vocabulary.map((item, idx) => 
                `<span class="vocab-item" data-index="${idx}">${item.word} (${item.meaning})</span>`
            ).join('');
            
            document.querySelectorAll('.vocab-item').forEach(el => {
                el.addEventListener('click', (e) => {
                    const idx = parseInt(e.target.dataset.index);
                    if (!isNaN(idx)) jumpToWord(idx);
                });
            });
        }

        function init() {
            drawWheel();
            displayVocabularyList();
            initSpinMusic();
            
            document.getElementById('spinBtn').addEventListener('click', spinWheel);
            document.getElementById('resetHistoryBtn').addEventListener('click', resetHistory);
            document.getElementById('musicToggleBtn').addEventListener('click', toggleMusic);
            
            document.body.addEventListener('click', function enableAudio() {
                if (spinMusic && spinMusic.state === 'suspended') {
                    spinMusic.resume();
                }
                document.body.removeEventListener('click', enableAudio);
            });
        }

        init();
    </script>
</body>
</html>
