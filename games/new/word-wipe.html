<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Word Wipe | Speak Ghana Vocabulary Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #D4A373;
            --green: #2A9D8F;
            --red: #E76F51;
            --black: #1E1E1E;
            --cream: #FDF8F2;
            --white: #FFFFFF;
            --gray: #666666;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--cream), #fff5e8);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .game-container {
            max-width: 650px;
            width: 100%;
            background: white;
            border-radius: 48px;
            padding: 1.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .game-header {
            text-align: center;
            margin-bottom: 1rem;
        }

        .game-header h1 {
            color: var(--green);
            font-size: 1.8rem;
            margin-bottom: 0.3rem;
        }

        .game-header p {
            color: var(--gray);
            font-size: 0.85rem;
        }

        .score-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--cream);
            padding: 0.8rem 1rem;
            border-radius: 60px;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .score-badge {
            background: var(--green);
            color: white;
            padding: 0.3rem 1rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .hint-badge {
            background: var(--gold);
            color: var(--black);
            padding: 0.3rem 1rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .hint-badge:hover {
            transform: scale(1.05);
            background: var(--green);
            color: white;
        }

        /* Game Grid */
        .game-grid {
            background: var(--cream);
            border-radius: 24px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            aspect-ratio: 5 / 6;
        }

        .letter-tile {
            background: white;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--green);
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid #e2e8f0;
            aspect-ratio: 1 / 1;
        }

        .letter-tile.selected {
            background: var(--gold);
            color: white;
            border-color: var(--gold);
            transform: scale(0.95);
        }

        .letter-tile.found {
            background: #e8f5e9;
            border-color: var(--green);
            color: var(--green);
            cursor: default;
            opacity: 0.6;
        }

        .letter-tile.highlight {
            background: var(--green);
            color: white;
            border-color: var(--green);
            animation: pulse 0.5s ease;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* Word Display */
        .current-word-area {
            background: var(--cream);
            border-radius: 60px;
            padding: 0.8rem;
            text-align: center;
            margin-bottom: 1rem;
        }

        .current-word {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 0.3rem;
            color: var(--green);
            font-family: monospace;
        }

        /* Word List */
        .word-list {
            background: var(--cream);
            border-radius: 24px;
            padding: 1rem;
            margin-bottom: 1rem;
            max-height: 180px;
            overflow-y: auto;
        }

        .word-list h3 {
            font-size: 0.9rem;
            color: var(--green);
            margin-bottom: 0.8rem;
            text-align: center;
        }

        .word-items {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            justify-content: center;
        }

        .word-chip {
            background: white;
            padding: 0.4rem 0.8rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--black);
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .word-chip:hover {
            background: var(--gold);
            color: white;
            transform: scale(1.05);
        }

        .word-chip.found {
            background: var(--green);
            color: white;
            text-decoration: line-through;
            opacity: 0.7;
            cursor: default;
        }

        .word-chip.found:hover {
            transform: none;
        }

        /* Buttons */
        .action-buttons {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 0.8rem;
        }

        .submit-btn {
            flex: 2;
            background: var(--gold);
            color: var(--black);
            border: none;
            padding: 0.8rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            background: var(--green);
            color: white;
        }

        .clear-btn {
            flex: 1;
            background: transparent;
            border: 1px solid var(--gray);
            color: var(--gray);
            padding: 0.8rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .clear-btn:hover {
            background: var(--red);
            border-color: var(--red);
            color: white;
        }

        .new-game-btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--gray);
            color: var(--gray);
            padding: 0.8rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .new-game-btn:hover {
            background: var(--red);
            border-color: var(--red);
            color: white;
        }

        .feedback {
            text-align: center;
            padding: 0.8rem;
            border-radius: 50px;
            margin: 1rem 0;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .feedback.correct {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .feedback.wrong {
            background: #ffebee;
            color: #c62828;
        }

        .results-stats {
            background: var(--cream);
            border-radius: 32px;
            padding: 2rem;
            margin: 1.5rem 0;
            text-align: center;
        }

        .results-score {
            font-size: 3rem;
            font-weight: 800;
            color: var(--green);
        }

        @media (max-width: 550px) {
            .letter-tile {
                font-size: 1.2rem;
                border-radius: 12px;
            }
            .current-word {
                font-size: 1.2rem;
                letter-spacing: 0.1rem;
            }
            .grid {
                gap: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer">
        <!-- Dynamic content -->
    </div>

    <script>
        // Target words for the game - EASIER SET (shorter words)
        const targetWords = [
            { word: "SIKA", meaning: "money" },
            { word: "BISA", meaning: "ask" },
            { word: "DIDI", meaning: "eat" },
            { word: "DUKU", meaning: "headwrap" },
            { word: "EFIE", meaning: "house" },
            { word: "ANI", meaning: "eye" },
            { word: "DIN", meaning: "name" },
            { word: "NANA", meaning: "grandparent" },
            { word: "ƐPO", meaning: "ocean" },
            { word: "ƆDƆ", meaning: "love" }
        ];

        let grid = [];
        let rows = 6;
        let cols = 5;
        let selectedLetters = [];
        let currentWord = "";
        let foundWords = [];
        let score = 0;
        let currentAudio = null;
        let wordPositions = []; // Store positions of each word for hints

        const audioUrls = {
            "SIKA": "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/sika.m4a",
            "BISA": "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/bisa.m4a",
            "DIDI": "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/didi.m4a",
            "DUKU": "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/duku.m4a",
            "EFIE": "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/efie.m4a",
            "ANI": "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/ani.m4a",
            "DIN": "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/din.m4a",
            "NANA": "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/nana.m4a",
            "ƐPO": "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/ɛpo.m4a",
            "ƆDƆ": "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/ɔdɔ.m4a"
        };

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function canPlaceWord(word, row, col, dir, tempGrid) {
            for (let i = 0; i < word.length; i++) {
                const r = row + i * dir.dr;
                const c = col + i * dir.dc;
                if (r < 0 || r >= rows || c < 0 || c >= cols) return false;
                if (tempGrid[r][c] !== '' && tempGrid[r][c] !== word[i]) return false;
            }
            return true;
        }

        function placeWord(word, row, col, dir, tempGrid) {
            const positions = [];
            for (let i = 0; i < word.length; i++) {
                const r = row + i * dir.dr;
                const c = col + i * dir.dc;
                tempGrid[r][c] = word[i];
                positions.push({ row: r, col: c });
            }
            return positions;
        }

        function generateGridWithWords() {
            // Create empty grid
            let newGrid = Array(rows).fill().map(() => Array(cols).fill(''));
            let placedWords = [];
            const directions = [
                { dr: 0, dc: 1, name: "right" },
                { dr: 1, dc: 0, name: "down" },
                { dr: 1, dc: 1, name: "diag-down" }
            ];
            
            // Shuffle words and try to place each one
            let shuffledWords = shuffleArray([...targetWords]);
            
            for (let wordObj of shuffledWords) {
                const word = wordObj.word;
                let placed = false;
                
                // Try to place word
                for (let dir of directions) {
                    for (let row = 0; row < rows; row++) {
                        for (let col = 0; col < cols; col++) {
                            if (canPlaceWord(word, row, col, dir, newGrid)) {
                                const positions = placeWord(word, row, col, dir, newGrid);
                                placedWords.push({ word: word, positions: positions });
                                placed = true;
                                break;
                            }
                        }
                        if (placed) break;
                    }
                    if (placed) break;
                }
            }
            
            // Fill empty cells with random letters from alphabet
            const alphabet = ['A','B','D','E','F','I','K','M','N','O','P','R','S','T','U','W','Y'];
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    if (newGrid[i][j] === '') {
                        newGrid[i][j] = alphabet[Math.floor(Math.random() * alphabet.length)];
                    }
                }
            }
            
            return { grid: newGrid, placedWords };
        }

        function handleLetterClick(row, col) {
            const tile = document.querySelector(`.letter-tile[data-row='${row}'][data-col='${col}']`);
            if (!tile || tile.classList.contains('found')) return;
            
            // Check if clicking the same tile again
            const isAlreadySelected = selectedLetters.some(s => s.row === row && s.col === col);
            
            if (isAlreadySelected) {
                // Remove from selection
                selectedLetters = selectedLetters.filter(s => !(s.row === row && s.col === col));
                tile.classList.remove('selected');
            } else {
                // Check if adjacent to last selected
                if (selectedLetters.length > 0) {
                    const last = selectedLetters[selectedLetters.length - 1];
                    const isAdjacent = (Math.abs(last.row - row) <= 1 && Math.abs(last.col - col) <= 1);
                    if (!isAdjacent) {
                        clearSelection();
                    }
                }
                selectedLetters.push({ row, col });
                tile.classList.add('selected');
            }
            
            updateCurrentWord();
        }

        function updateCurrentWord() {
            currentWord = "";
            for (let cell of selectedLetters) {
                currentWord += grid[cell.row][cell.col];
            }
            document.getElementById('currentWord').textContent = currentWord || "___";
        }

        function clearSelection() {
            for (let cell of selectedLetters) {
                const tile = document.querySelector(`.letter-tile[data-row='${cell.row}'][data-col='${cell.col}']`);
                if (tile) {
                    tile.classList.remove('selected');
                }
            }
            selectedLetters = [];
            updateCurrentWord();
        }

        function checkWord() {
            if (currentWord.length < 2) {
                showFeedback("Select at least 2 letters!", "wrong");
                return;
            }
            
            const foundWord = targetWords.find(w => w.word === currentWord && !foundWords.includes(w.word));
            
            if (foundWord) {
                foundWords.push(foundWord.word);
                score++;
                
                for (let cell of selectedLetters) {
                    const tile = document.querySelector(`.letter-tile[data-row='${cell.row}'][data-col='${cell.col}']`);
                    if (tile) {
                        tile.classList.remove('selected');
                        tile.classList.add('found');
                    }
                }
                
                const wordChip = document.querySelector(`.word-chip[data-word='${foundWord.word}']`);
                if (wordChip) {
                    wordChip.classList.add('found');
                }
                
                showFeedback(`✅ Found "${foundWord.word}"! (${foundWord.meaning})`, "correct");
                playAudio(foundWord.word);
                
                selectedLetters = [];
                updateCurrentWord();
                updateScoreBar();
                
                if (foundWords.length === targetWords.length) {
                    setTimeout(() => {
                        showResults();
                    }, 1000);
                }
            } else {
                const alreadyFound = targetWords.find(w => w.word === currentWord);
                if (alreadyFound) {
                    showFeedback(`⚠️ You already found "${currentWord}"!`, "wrong");
                } else {
                    showFeedback(`❌ "${currentWord}" is not in our word list!`, "wrong");
                }
                clearSelection();
            }
        }

        function showHint() {
            // Find a word that hasn't been found yet
            const notFound = targetWords.filter(w => !foundWords.includes(w.word));
            if (notFound.length === 0) {
                showFeedback("You already found all words! Start a new game!", "correct");
                return;
            }
            
            // Pick a random unfound word
            const hintWord = notFound[Math.floor(Math.random() * notFound.length)];
            
            // Find its first letter position in the grid
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    if (grid[i][j] === hintWord.word[0]) {
                        // Highlight the first letter
                        const tile = document.querySelector(`.letter-tile[data-row='${i}'][data-col='${j}']`);
                        if (tile && !tile.classList.contains('found')) {
                            tile.classList.add('highlight');
                            setTimeout(() => {
                                tile.classList.remove('highlight');
                            }, 1000);
                            
                            showFeedback(`💡 Hint: Find "${hintWord.word}" which means "${hintWord.meaning}"`, "correct");
                            return;
                        }
                    }
                }
            }
            
            showFeedback(`💡 Hint: Look for "${hintWord.word}" (${hintWord.meaning})`, "correct");
        }

        function playAudio(word) {
            const url = audioUrls[word];
            if (url) {
                if (currentAudio) {
                    currentAudio.pause();
                    currentAudio.currentTime = 0;
                }
                currentAudio = new Audio(url);
                currentAudio.play().catch(e => console.log('Audio error:', e));
            }
        }

        function showFeedback(message, type) {
            const feedbackDiv = document.getElementById('feedback');
            feedbackDiv.innerHTML = message;
            feedbackDiv.className = `feedback ${type}`;
            setTimeout(() => {
                if (feedbackDiv.innerHTML === message) {
                    feedbackDiv.innerHTML = '';
                    feedbackDiv.className = '';
                }
            }, 2000);
        }

        function updateScoreBar() {
            const scoreBar = document.getElementById('scoreBar');
            if (scoreBar) {
                scoreBar.innerHTML = `
                    <div class="score-bar">
                        <span class="score-badge">⭐ Score: ${score}</span>
                        <span class="score-badge">🎯 Words: ${foundWords.length}/${targetWords.length}</span>
                        <span class="hint-badge" onclick="showHint()">💡 Hint</span>
                    </div>
                `;
            }
        }

        function renderGame() {
            const gameArea = document.getElementById('gameArea');
            
            let gridHtml = '<div class="grid">';
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    const isFound = foundWords.some(word => {
                        // Check if this letter is part of a found word - simplified
                        return false;
                    });
                    gridHtml += `
                        <div class="letter-tile" data-row="${i}" data-col="${j}" onclick="handleLetterClick(${i}, ${j})">
                            ${grid[i][j]}
                        </div>
                    `;
                }
            }
            gridHtml += '</div>';
            
            let wordListHtml = '<div class="word-items">';
            for (let word of targetWords) {
                const isFound = foundWords.includes(word.word);
                wordListHtml += `
                    <div class="word-chip ${isFound ? 'found' : ''}" data-word="${word.word}" onclick="if(!${isFound}) highlightWord('${word.word}')">
                        ${word.word} (${word.meaning})
                    </div>
                `;
            }
            wordListHtml += '</div>';
            
            gameArea.innerHTML = `
                <div class="game-grid">
                    ${gridHtml}
                </div>
                
                <div class="current-word-area">
                    <div class="current-word" id="currentWord">___</div>
                </div>
                
                <div class="word-list">
                    <h3>📝 Find These Words (click any word for hint)</h3>
                    ${wordListHtml}
                </div>
                
                <div id="feedback" class="feedback"></div>
                
                <div class="action-buttons">
                    <button class="submit-btn" onclick="checkWord()">✅ Submit Word</button>
                    <button class="clear-btn" onclick="clearSelection()">🗑️ Clear</button>
                </div>
                
                <button class="new-game-btn" onclick="startNewGame()">🔄 New Game</button>
            `;
        }

        function highlightWord(word) {
            // Find and highlight the first letter of the word
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    if (grid[i][j] === word[0]) {
                        const tile = document.querySelector(`.letter-tile[data-row='${i}'][data-col='${j}']`);
                        if (tile && !tile.classList.contains('found')) {
                            tile.classList.add('highlight');
                            setTimeout(() => {
                                tile.classList.remove('highlight');
                            }, 1000);
                            showFeedback(`💡 Look for "${word}" in the grid!`, "correct");
                            return;
                        }
                    }
                }
            }
            showFeedback(`💡 Try to find "${word}" in the grid!`, "correct");
        }

        function showResults() {
            const gameContainer = document.getElementById('gameContainer');
            gameContainer.innerHTML = `
                <div class="game-header">
                    <h1>🏆 Game Complete!</h1>
                    <p>You found all the words!</p>
                </div>
                
                <div class="results-stats">
                    <div class="results-score">${foundWords.length} / ${targetWords.length}</div>
                    <div class="results-score" style="font-size: 1.5rem; margin-top: 0.5rem;">100%</div>
                    <p style="margin-top: 1rem;">Excellent! You know these Twi words!</p>
                </div>
                
                <div style="background: var(--cream); border-radius: 24px; padding: 1rem; margin-top: 1rem;">
                    <h3 style="color: var(--green); margin-bottom: 0.5rem;">🎉 Congratulations!</h3>
                    <p style="color: var(--gray);">You found all ${targetWords.length} Twi words!</p>
                </div>
                
                <button class="new-game-btn" onclick="location.reload()" style="margin-top: 1rem;">
                    🎮 Play New Game
                </button>
            `;
        }

        function startNewGame() {
            const { grid: newGrid, placedWords } = generateGridWithWords();
            grid = newGrid;
            wordPositions = placedWords;
            selectedLetters = [];
            currentWord = "";
            foundWords = [];
            score = 0;
            renderFullGame();
        }

        function renderFullGame() {
            const gameContainer = document.getElementById('gameContainer');
            gameContainer.innerHTML = `
                <div class="game-header">
                    <h1>🔍 Word Wipe</h1>
                    <p>Connect adjacent letters to form Twi words</p>
                </div>
                
                <div id="scoreBar">
                    <div class="score-bar">
                        <span class="score-badge">⭐ Score: 0</span>
                        <span class="score-badge">🎯 Words: 0/${targetWords.length}</span>
                        <span class="hint-badge" onclick="showHint()">💡 Hint</span>
                    </div>
                </div>
                
                <div id="gameArea"></div>
            `;
            
            renderGame();
        }

        // Make functions global
        window.handleLetterClick = handleLetterClick;
        window.checkWord = checkWord;
        window.clearSelection = clearSelection;
        window.startNewGame = startNewGame;
        window.showHint = showHint;
        window.highlightWord = highlightWord;

        // Start the game
        startNewGame();
    </script>
</body>
</html>
