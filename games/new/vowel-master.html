<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Vowel Sound Match | Speak Ghana Pronunciation Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #D4A373;
            --green: #2A9D8F;
            --red: #E76F51;
            --black: #1E1E1E;
            --cream: #FDF8F2;
            --white: #FFFFFF;
            --gray: #666666;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--cream), #fff5e8);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .game-container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 48px;
            padding: 1.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .game-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .game-header h1 {
            color: var(--green);
            font-size: 1.8rem;
            margin-bottom: 0.3rem;
        }

        .game-header p {
            color: var(--gray);
            font-size: 0.85rem;
        }

        .score-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--cream);
            padding: 0.8rem 1rem;
            border-radius: 60px;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .score-badge {
            background: var(--green);
            color: white;
            padding: 0.3rem 1rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .streak-badge {
            background: var(--gold);
            color: var(--black);
            padding: 0.3rem 1rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .question-card {
            background: linear-gradient(135deg, var(--green), #1f7a6e);
            border-radius: 32px;
            padding: 2rem;
            text-align: center;
            color: white;
            margin-bottom: 1.5rem;
        }

        .question-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .question-text {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .question-sub {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .audio-btn {
            background: var(--gold);
            border: none;
            color: var(--black);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .audio-btn:hover {
            transform: scale(1.05);
            background: white;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .option-btn {
            background: var(--cream);
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            padding: 1.2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            font-size: 1.2rem;
            color: var(--black);
        }

        .option-btn small {
            display: block;
            font-size: 0.7rem;
            font-weight: normal;
            color: var(--gray);
            margin-top: 0.3rem;
        }

        .option-btn:hover {
            transform: translateY(-3px);
            border-color: var(--gold);
            background: #fff5e8;
        }

        .option-btn.correct {
            background: var(--green);
            border-color: var(--green);
            color: white;
        }

        .option-btn.correct small {
            color: rgba(255,255,255,0.8);
        }

        .option-btn.wrong {
            background: var(--red);
            border-color: var(--red);
            color: white;
        }

        .option-btn.wrong small {
            color: rgba(255,255,255,0.8);
        }

        .option-btn.disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        .feedback {
            text-align: center;
            padding: 0.8rem;
            border-radius: 50px;
            margin: 1rem 0;
            font-weight: 600;
        }

        .feedback.correct {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .feedback.incorrect {
            background: #ffebee;
            color: #c62828;
        }

        .next-btn {
            width: 100%;
            background: var(--gold);
            color: var(--black);
            border: none;
            padding: 1rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }

        .next-btn:hover {
            transform: translateY(-3px);
            background: var(--green);
            color: white;
        }

        .results-screen {
            text-align: center;
        }

        .results-stats {
            background: var(--cream);
            border-radius: 32px;
            padding: 2rem;
            margin: 1.5rem 0;
        }

        .results-score {
            font-size: 3rem;
            font-weight: 800;
            color: var(--green);
        }

        .reset-btn {
            background: transparent;
            border: 1px solid var(--gray);
            color: var(--gray);
            padding: 0.8rem;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 0.8rem;
        }

        .reset-btn:hover {
            background: var(--red);
            border-color: var(--red);
            color: white;
        }

        @media (max-width: 550px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
            .question-text {
                font-size: 1.5rem;
            }
            .option-btn {
                font-size: 1rem;
                padding: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer">
        <!-- Dynamic content -->
    </div>

    <script>
        // Vowel sound questions
        const vowelQuestions = [
            { word: "sekan", meaning: "knife", vowel: "ɪ", sound: "i in 'sit'", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/sekan.m4a" },
            { word: "nante", meaning: "walk", vowel: "ɪ", sound: "i in 'sit'", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/nante.m4a" },
            { word: "duku", meaning: "headwrap", vowel: "u", sound: "oo in 'food'", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/duku.m4a" },
            { word: "banku", meaning: "banku", vowel: "u", sound: "oo in 'food'", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/banku.m4a" },
            { word: "ɛpo", meaning: "ocean", vowel: "ʊ", sound: "u in 'put'", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/ɛpo.m4a" },
            { word: "nnwom", meaning: "songs", vowel: "ʊ", sound: "u in 'put'", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/nnwom.m4a" },
            { word: "efie", meaning: "house", vowel: "e", sound: "ey in 'they'", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/efie.m4a" },
            { word: "ewiase", meaning: "world", vowel: "e", sound: "ey in 'they'", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/ewiase.m4a" },
            { word: "ɛdan", meaning: "building", vowel: "ɛ", sound: "e in 'bed'", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/ɛdan.m4a" },
            { word: "ɔbrɛ", meaning: "tiredness", vowel: "ɛ", sound: "e in 'bed'", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/ɔbrɛ.m4a" },
            { word: "owuo", meaning: "death", vowel: "o", sound: "o in 'go'", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/owuo.m4a" },
            { word: "odwan", meaning: "sheep", vowel: "o", sound: "o in 'go'", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/odwan.m4a" },
            { word: "ɔdɔ", meaning: "love", vowel: "ɔ", sound: "aw in 'law'", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/ɔdɔ.m4a" },
            { word: "ɔkyena", meaning: "tomorrow", vowel: "ɔ", sound: "aw in 'law'", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/ɔkyena.m4a" },
            { word: "ani", meaning: "eye", vowel: "æ", sound: "a in 'cat'", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/ani.m4a" },
            { word: "aburo", meaning: "corn", vowel: "æ", sound: "a in 'cat'", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/aburo.m4a" },
            { word: "aboa", meaning: "animal", vowel: "a", sound: "a in 'father'", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/aboa.m4a" },
            { word: "abaa", meaning: "stick", vowel: "a", sound: "a in 'father'", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/abaa.m4a" },
            { word: "sika", meaning: "money", vowel: "ɪ", sound: "i in 'sit'", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/sika.m4a" },
            { word: "bisa", meaning: "ask", vowel: "ɪ", sound: "i in 'sit'", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/bisa.m4a" },
            { word: "didi", meaning: "eat", vowel: "ɪ", sound: "i in 'sit'", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/didi.m4a" },
            { word: "kanea", meaning: "lamp", vowel: "a", sound: "a in 'father'", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/kanea.m4a" },
            { word: "nana", meaning: "grandparent", vowel: "a", sound: "a in 'father'", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/nana.m4a" },
            { word: "praeɛ", meaning: "broom", vowel: "ɛ", sound: "e in 'bed'", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/praeɛ.m4a" },
            { word: "rɔba", meaning: "rubber", vowel: "ɔ", sound: "aw in 'law'", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/rɔba.m4a" },
            { word: "waduro", meaning: "mortar", vowel: "a", sound: "a in 'father'", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/waduro.m4a" },
            { word: "yoma", meaning: "camel", vowel: "o", sound: "o in 'go'", audio: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/audio/new/yoma.m4a" }
        ];

        // Vowel options (without example words - just the symbol and sound description)
        const vowelOptions = [
            { vowel: "ɪ", name: "/ɪ/", description: "i as in 'sit'" },
            { vowel: "u", name: "/u/", description: "oo as in 'food'" },
            { vowel: "ʊ", name: "/ʊ/", description: "u as in 'put'" },
            { vowel: "e", name: "/e/", description: "ey as in 'they'" },
            { vowel: "ɛ", name: "/ɛ/", description: "e as in 'bed'" },
            { vowel: "o", name: "/o/", description: "o as in 'go'" },
            { vowel: "ɔ", name: "/ɔ/", description: "aw as in 'law'" },
            { vowel: "æ", name: "/æ/", description: "a as in 'cat'" },
            { vowel: "a", name: "/a/", description: "a as in 'father'" }
        ];

        let currentQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let streak = 0;
        let answerLocked = false;
        let currentAudio = null;

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function getRandomOptions(correctVowel) {
            // Get 3 random different vowels plus the correct one
            let otherVowels = vowelOptions.filter(v => v.vowel !== correctVowel);
            let shuffledOthers = shuffleArray([...otherVowels]);
            let options = [vowelOptions.find(v => v.vowel === correctVowel)];
            options.push(shuffledOthers[0]);
            options.push(shuffledOthers[1]);
            options.push(shuffledOthers[2]);
            return shuffleArray(options);
        }

        function playAudio(url) {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }
            currentAudio = new Audio(url);
            currentAudio.play().catch(e => console.log('Audio error:', e));
        }

        function checkAnswer(selectedVowel) {
            if (answerLocked) return;
            
            const currentQuestion = currentQuestions[currentIndex];
            const isCorrect = selectedVowel === currentQuestion.vowel;
            
            const feedbackDiv = document.getElementById('feedback');
            const options = document.querySelectorAll('.option-btn');
            
            answerLocked = true;
            
            if (isCorrect) {
                score++;
                streak++;
                feedbackDiv.innerHTML = `✅ Correct! "${currentQuestion.word}" has the vowel sound /${currentQuestion.vowel}/ (${currentQuestion.sound}). +1 point!`;
                feedbackDiv.className = 'feedback correct';
                
                // Highlight correct answer
                options.forEach(opt => {
                    if (opt.getAttribute('data-vowel') === currentQuestion.vowel) {
                        opt.classList.add('correct');
                    }
                });
            } else {
                streak = 0;
                feedbackDiv.innerHTML = `❌ Incorrect. "${currentQuestion.word}" has the vowel sound /${currentQuestion.vowel}/ (${currentQuestion.sound}).`;
                feedbackDiv.className = 'feedback incorrect';
                
                // Highlight selected wrong answer and correct answer
                options.forEach(opt => {
                    if (opt.getAttribute('data-vowel') === selectedVowel) {
                        opt.classList.add('wrong');
                    }
                    if (opt.getAttribute('data-vowel') === currentQuestion.vowel) {
                        opt.classList.add('correct');
                    }
                });
            }
            
            // Disable all options
            options.forEach(opt => {
                opt.style.pointerEvents = 'none';
                opt.classList.add('disabled');
            });
            
            // Update score display
            updateScoreBar();
        }

        function updateScoreBar() {
            const total = currentQuestions.length;
            const remaining = total - currentIndex - 1;
            const scoreBar = document.getElementById('scoreBar');
            if (scoreBar) {
                scoreBar.innerHTML = `
                    <div class="score-bar">
                        <span class="score-badge">⭐ Score: ${score}</span>
                        <span class="streak-badge">🔥 Streak: ${streak}</span>
                        <span class="score-badge">📚 Left: ${remaining}</span>
                    </div>
                `;
            }
        }

        function nextQuestion() {
            if (currentIndex + 1 < currentQuestions.length) {
                currentIndex++;
                answerLocked = false;
                renderQuestion();
            } else {
                showResults();
            }
        }

        function renderQuestion() {
            const question = currentQuestions[currentIndex];
            const options = getRandomOptions(question.vowel);
            
            const gameArea = document.getElementById('gameArea');
            
            gameArea.innerHTML = `
                <div class="question-card">
                    <div class="question-icon">🔊</div>
                    <div class="question-text">"${question.word}"</div>
                    <div class="question-sub">means "${question.meaning}"</div>
                    <button class="audio-btn" onclick="playAudio('${question.audio}')">
                        🔊 Listen to Pronunciation
                    </button>
                </div>
                
                <div class="options-grid" id="optionsGrid">
                    ${options.map(opt => `
                        <div class="option-btn" data-vowel="${opt.vowel}" onclick="checkAnswer('${opt.vowel}')">
                            ${opt.name}<br>
                            <small>${opt.description}</small>
                        </div>
                    `).join('')}
                </div>
                
                <div id="feedback" class="feedback"></div>
                
                <button class="next-btn" onclick="nextQuestion()">Next Word →</button>
            `;
            
            updateScoreBar();
        }

        function showResults() {
            const total = currentQuestions.length;
            const percentage = Math.round((score / total) * 100);
            let message = "";
            
            if (percentage >= 90) {
                message = "Excellent! You're a vowel master!";
            } else if (percentage >= 70) {
                message = "Great job! Keep practicing!";
            } else if (percentage >= 50) {
                message = "Good effort! Review the vowel sounds and try again.";
            } else {
                message = "Keep practicing! Listen to the audio and learn the vowel patterns.";
            }
            
            const gameContainer = document.getElementById('gameContainer');
            gameContainer.innerHTML = `
                <div class="game-header">
                    <h1>📊 Quiz Complete!</h1>
                    <p>Vowel sound recognition</p>
                </div>
                
                <div class="results-stats">
                    <div class="results-score">${score} / ${total}</div>
                    <div class="results-score" style="font-size: 1.5rem; margin-top: 0.5rem;">${percentage}%</div>
                    <p style="margin-top: 1rem;">${message}</p>
                </div>
                
                <div style="background: var(--cream); border-radius: 24px; padding: 1rem; margin-top: 1rem;">
                    <h3 style="color: var(--green); margin-bottom: 0.5rem;">📖 Vowel Sound Guide</h3>
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; font-size: 0.75rem;">
                        <div><strong>/ɪ/</strong> i as in "sit"</div>
                        <div><strong>/u/</strong> oo as in "food"</div>
                        <div><strong>/ʊ/</strong> u as in "put"</div>
                        <div><strong>/e/</strong> ey as in "they"</div>
                        <div><strong>/ɛ/</strong> e as in "bed"</div>
                        <div><strong>/o/</strong> o as in "go"</div>
                        <div><strong>/ɔ/</strong> aw as in "law"</div>
                        <div><strong>/æ/</strong> a as in "cat"</div>
                        <div><strong>/a/</strong> a as in "father"</div>
                    </div>
                </div>
                
                <button class="reset-btn" onclick="startNewGame()">
                    🔄 Play Again
                </button>
            `;
        }

        function startNewGame() {
            currentQuestions = shuffleArray([...vowelQuestions]);
            currentIndex = 0;
            score = 0;
            streak = 0;
            answerLocked = false;
            
            renderFullGame();
        }

        function renderFullGame() {
            const gameContainer = document.getElementById('gameContainer');
            gameContainer.innerHTML = `
                <div class="game-header">
                    <h1>🎵 Vowel Sound Match</h1>
                    <p>Listen to the word • Choose the correct vowel sound</p>
                </div>
                
                <div id="scoreBar">
                    <div class="score-bar">
                        <span class="score-badge">⭐ Score: 0</span>
                        <span class="streak-badge">🔥 Streak: 0</span>
                        <span class="score-badge">📚 Left: ${currentQuestions.length}</span>
                    </div>
                </div>
                
                <div id="gameArea"></div>
            `;
            
            renderQuestion();
        }

        // Initialize the game
        startNewGame();
    </script>
</body>
</html>
