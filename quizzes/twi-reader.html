<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twi Reader - Read & Understand | Speak Ghana</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f2b2a, #1f7a6e);
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 { color: #2A9D8F; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
        .level-badge {
            display: inline-block;
            background: #E76F51;
            color: white;
            padding: 0.2rem 0.8rem;
            border-radius: 50px;
            font-size: 0.7rem;
            margin-left: 0.5rem;
        }
        .passage-card {
            background: #FDF8F2;
            border-radius: 24px;
            padding: 1.5rem;
            margin: 1.5rem 0;
            border: 1px solid #eee;
        }
        .passage-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #2A9D8F;
            margin-bottom: 0.5rem;
        }
        .passage-level {
            font-size: 0.7rem;
            color: #E76F51;
            margin-bottom: 1rem;
        }
        .passage-text {
            font-size: 1rem;
            line-height: 1.6;
            color: #1E1E1E;
            margin-bottom: 1.5rem;
            background: white;
            padding: 1rem;
            border-radius: 16px;
        }
        .vocab-box {
            background: #e8f4f1;
            border-radius: 16px;
            padding: 1rem;
            margin: 1rem 0;
        }
        .vocab-word {
            font-weight: bold;
            color: #2A9D8F;
            cursor: pointer;
        }
        .questions {
            margin-top: 1.5rem;
        }
        .question {
            margin-bottom: 1rem;
            padding: 0.8rem;
            background: white;
            border-radius: 12px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .option-btn {
            background: #f0f0f0;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
        }
        .option-btn:hover { background: #2A9D8F; color: white; }
        .option-btn.correct { background: #2A9D8F; color: white; }
        .option-btn.wrong { background: #E76F51; color: white; }
        .feedback { margin-top: 0.3rem; font-size: 0.8rem; display: none; }
        .feedback.show { display: block; }
        .feedback.correct { color: #2A9D8F; }
        .feedback.incorrect { color: #E76F51; }
        .nav-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 1.5rem 0;
        }
        .nav-btn {
            background: #2A9D8F;
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }
        .nav-btn:hover { background: #1f7a6e; }
        .close-btn {
            background: #D4A373;
            color: white;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 1rem;
        }
        .score-area {
            text-align: center;
            padding: 1rem;
            background: #2A9D8F20;
            border-radius: 20px;
            margin-top: 1rem;
        }
        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .passage-text { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📖 Twi Reader <span class="level-badge">Beginner Friendly</span></h1>
        <p style="color: #666; margin-bottom: 1rem;">Read short passages in Twi and test your understanding</p>

        <div id="passageContainer"></div>

        <div class="nav-buttons">
            <button class="nav-btn" onclick="prevPassage()">◀ Previous</button>
            <button class="nav-btn" onclick="nextPassage()">Next ▶</button>
        </div>

        <div style="text-align: center; margin-top: 1rem;">
            <button class="close-btn" onclick="window.close()">❌ Close</button>
        </div>
    </div>

    <script>
        let currentIndex = 0;
        let userAnswers = {};

        const passages = [
            {
                id: 1,
                title: "Me Ho Yɛ - I Am Fine",
                level: "Beginner 1",
                text: `Me din de Kofi. Mete Ghana. Madi mfeɛ du. Me ho yɛ. Me pɛ sɛ mekɔ sukuu. Mepɛ sɛ mesua Twi.`,
                translation: "My name is Kofi. I live in Ghana. I am 10 years old. I am fine. I want to go to school. I want to learn Twi.",
                vocab: [
                    { word: "Mefrɛ", meaning: "My name is" },
                    { word: "Mewɔ", meaning: "I live in" },
                    { word: "Madi mfeɛ", meaning: "I am ... years old" },
                    { word: "Me ho yɛ", meaning: "I am fine" },
                    { word: "Mepɛ sɛ", meaning: "I want to" },
                    { word: "sukuu", meaning: "school" },
                    { word: "misua", meaning: "I learn" }
                ],
                questions: [
                    { text: "What is the boy's name?", options: ["Kwame", "Kofi", "Yaw", "Kojo"], correct: 1 },
                    { text: "Where does he live?", options: ["Togo", "Nigeria", "Ghana", "Ivory Coast"], correct: 2 },
                    { text: "How old is he?", options: ["8 years", "10 years", "12 years", "15 years"], correct: 1 },
                    { text: "What does he want to do?", options: ["Go to market", "Go to school", "Go to church", "Go to farm"], correct: 1 },
                    { text: "What does he want to learn?", options: ["English", "French", "Twi", "Math"], correct: 2 }
                ]
            },
            {
                id: 2,
                title: "Me Fie - My House",
                level: "Beginner 1",
                text: `Me fie wɔ Nkran. Me fie yɛ kɛse. Ɛwɔ ɛdan mmienu. Mewɔ agya ne ɛna. Mewɔ nua baako. Me pɛ me fie.`,
                translation: "My house is in Accra. My house is big. It has two rooms. I have a father and mother. I have one sibling. I love my house.",
                vocab: [
                    { word: "Me fie", meaning: "My house" },
                    { word: "wɔ", meaning: "is located at" },
                    { word: "kɛse", meaning: "big" },
                    { word: "dan mmienu", meaning: "two rooms" },
                    { word: "agya", meaning: "father" },
                    { word: "ɛna", meaning: "mother" },
                    { word: "nua baako", meaning: "one sibling" },
                    { word: "Me pɛ", meaning: "I love" }
                ],
                questions: [
                    { text: "Where is his house?", options: ["Kumasi", "Accra", "Takoradi", "Tamale"], correct: 1 },
                    { text: "How many rooms does it have?", options: ["One", "Two", "Three", "Four"], correct: 1 },
                    { text: "Who does he have?", options: ["Sister only", "Brother only", "Father and mother", "Grandparents"], correct: 2 },
                    { text: "How many siblings does he have?", options: ["None", "One", "Two", "Three"], correct: 1 },
                    { text: "Does he love his house?", options: ["Yes", "No", "Maybe", "Not sure"], correct: 0 }
                ]
            },
            {
                id: 3,
                title: "Aguadi - Shopping",
                level: "Beginner 2",
                text: `Me ne me maame kɔɔ edwam. Yɛtɔɔ aburo, nkwan ne nam. Ɛboɔ no yɛ. Me maame tɔɔ amango baako maa me. Medaase me mama.`,
                translation: "I went to the market with my mother. We bought corn, soup, and meat. The prices were good. My mother bought me one mango. Thank you, mother.",
                vocab: [
                    { word: "kɔɔ", meaning: "went" },
                    { word: "edwam", meaning: "market" },
                    { word: "tɔɔ", meaning: "bought" },
                    { word: "aburo", meaning: "corn" },
                    { word: "nkwan", meaning: "soup" },
                    { word: "nam", meaning: "meat" },
                    { word: "ɛboɔ no yɛ", meaning: "the prices are good" },
                    { word: "amango baako", meaning: "one mango" }
                ],
                questions: [
                    { text: "Who did he go with?", options: ["Father", "Mother", "Friend", "Alone"], correct: 1 },
                    { text: "Where did they go?", options: ["Church", "School", "Market", "Farm"], correct: 2 },
                    { text: "What did they buy?", options: ["Rice only", "Fish only", "Corn, soup, meat", "Fruits only"], correct: 2 },
                    { text: "What did mother buy for him?", options: ["Orange", "Banana", "Mango", "Apple"], correct: 2 },
                    { text: "Did he thank his mother?", options: ["Yes", "No"], correct: 0 }
                ]
            },
            {
                id: 4,
                title: "Afe Foforo - New Year",
                level: "Beginner 2",
                text: `Afe foforo no, me ne me abusua hyia ɛ. Yɛdidii. Yɛnom nsa. Yɛbɔɔ mpaɛ. Nyankopɔn nhyira wo. Afehyia pa.`,
                translation: "On New Year, I met with my family. We ate. We drank. We prayed. God bless you. Good year.",
                vocab: [
                    { word: "Afe fofor", meaning: "New Year" },
                    { word: "busua", meaning: "family" },
                    { word: "hyia", meaning: "met / gathered" },
                    { word: "yɛdidii", meaning: "we ate" },
                    { word: "yɛnom nsa", meaning: "we drank" },
                    { word: "yɛbɔɔ mpa", meaning: "we prayed" },
                    { word: "Nyankopɔn nhyira wo", meaning: "God bless you" }
                ],
                questions: [
                    { text: "What occasion is this?", options: ["Birthday", "New Year", "Wedding", "Funeral"], correct: 1 },
                    { text: "Who did he meet with?", options: ["Friends", "Family", "Teachers", "Neighbors"], correct: 1 },
                    { text: "What did they do?", options: ["Sang only", "Ate, drank, prayed", "Danced only", "Slept"], correct: 1 },
                    { text: "What blessing is given?", options: ["Good health", "God bless you", "Long life", "Wealth"], correct: 1 },
                    { text: "Is this a positive or negative event?", options: ["Positive", "Negative"], correct: 0 }
                ]
            },
            {
                id: 5,
                title: "Sukuu - School",
                level: "Beginner 2",
                text: `Mekɔ sukuu daa. Me sukuu wɔ Accra. Me pɛ me kyerɛkyerɛfo no asɛm. Mesua Twi ne Brofo kasa. Mepɛ sɛ meyɛ ɔyaresani.`,
                translation: "I go to school every day. My school is in Accra. I like my teacher. I study Twi and English. I want to be a doctor.",
                vocab: [
                    { word: "kɔ sukuu", meaning: "go to school" },
                    { word: "daa", meaning: "every day" },
                    { word: "kyerɛkyerɛfo", meaning: "teacher" },
                    { word: "sua", meaning: "to learn / study" },
                    { word: "ɔyaresani", meaning: "doctor" }
                ],
                questions: [
                    { text: "Where is his school?", options: ["Kumasi", "Accra", "Cape Coast", "Tema"], correct: 1 },
                    { text: "Does he like his teacher?", options: ["Yes", "No", "Maybe"], correct: 0 },
                    { text: "What subjects does he study?", options: ["Math & Science", "Twi & English", "History & Geography", "Art & Music"], correct: 1 },
                    { text: "What does he want to become?", options: ["Teacher", "Doctor", "Engineer", "Lawyer"], correct: 1 },
                    { text: "Does he go to school every day?", options: ["Yes", "No"], correct: 0 }
                ]
            }
        ];

        function renderPassage() {
            const passage = passages[currentIndex];
            const container = document.getElementById('passageContainer');
            
            let html = `
                <div class="passage-card">
                    <div class="passage-title">${passage.title}</div>
                    <div class="passage-level">📚 Level: ${passage.level}</div>
                    <div class="passage-text">${passage.text}</div>
                    
                    <details class="vocab-box">
                        <summary style="cursor: pointer; font-weight: bold; color: #2A9D8F;">📖 Vocabulary Help (Click to expand)</summary>
                        <div style="margin-top: 0.8rem;">
                            ${passage.vocab.map(v => `<div><strong>${v.word}</strong>: ${v.meaning}</div>`).join('')}
                            <hr style="margin: 0.5rem 0;">
                            <div><em>📝 Translation: ${passage.translation}</em></div>
                        </div>
                    </details>
                    
                    <div class="questions">
                        <h4 style="color: #2A9D8F; margin-bottom: 0.8rem;">📝 Comprehension Questions</h4>
                        ${passage.questions.map((q, idx) => `
                            <div class="question" data-qid="${idx}">
                                <strong>${idx + 1}. ${q.text}</strong>
                                <div class="options">
                                    ${q.options.map((opt, optIdx) => `
                                        <button class="option-btn" onclick="checkAnswer(${currentIndex}, ${idx}, ${optIdx})">
                                            ${String.fromCharCode(65 + optIdx)}. ${opt}
                                        </button>
                                    `).join('')}
                                </div>
                                <div class="feedback" id="feedback-${idx}"></div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="score-area" id="scoreArea"></div>
            `;
            
            container.innerHTML = html;
            updateScoreDisplay();
        }

        function checkAnswer(passageId, qId, selectedIdx) {
            const passage = passages[passageId];
            const question = passage.questions[qId];
            const isCorrect = (selectedIdx === question.correct);
            
            const feedbackDiv = document.getElementById(`feedback-${qId}`);
            feedbackDiv.classList.add('show');
            
            // Store answer
            const key = `${passageId}-${qId}`;
            userAnswers[key] = { selected: selectedIdx, correct: isCorrect };
            
            if (isCorrect) {
                feedbackDiv.innerHTML = '✅ Correct! Well done.';
                feedbackDiv.classList.add('correct');
                feedbackDiv.classList.remove('incorrect');
            } else {
                const correctLetter = String.fromCharCode(65 + question.correct);
                const correctText = question.options[question.correct];
                feedbackDiv.innerHTML = `❌ Incorrect. The correct answer is ${correctLetter}: ${correctText}`;
                feedbackDiv.classList.add('incorrect');
                feedbackDiv.classList.remove('correct');
            }
            
            // Disable all option buttons for this question
            const questionDiv = document.querySelector(`.question[data-qid="${qId}"]`);
            const btns = questionDiv.querySelectorAll('.option-btn');
            btns.forEach(btn => btn.disabled = true);
            
            // Highlight correct/incorrect
            btns.forEach((btn, idx) => {
                if (idx === question.correct) {
                    btn.classList.add('correct');
                }
                if (idx === selectedIdx && selectedIdx !== question.correct) {
                    btn.classList.add('wrong');
                }
            });
            
            updateScoreDisplay();
        }

        function updateScoreDisplay() {
            const passage = passages[currentIndex];
            let totalQuestions = passage.questions.length;
            let correctCount = 0;
            
            for (let i = 0; i < totalQuestions; i++) {
                const key = `${currentIndex}-${i}`;
                if (userAnswers[key] && userAnswers[key].correct) {
                    correctCount++;
                }
            }
            
            const scoreArea = document.getElementById('scoreArea');
            if (scoreArea) {
                const percentage = Math.round((correctCount / totalQuestions) * 100);
                scoreArea.innerHTML = `
                    <strong>📊 Your Score: ${correctCount}/${totalQuestions} (${percentage}%)</strong>
                    ${percentage === 100 ? '<br>🎉 Perfect! You understand this passage well!' : ''}
                    ${percentage >= 70 && percentage < 100 ? '<br>👍 Good job! Review the vocabulary and try again.' : ''}
                    ${percentage < 70 && percentage > 0 ? '<br>📚 Keep studying! Use the vocabulary help and try again.' : ''}
                `;
            }
        }

        function prevPassage() {
            if (currentIndex > 0) {
                currentIndex--;
                renderPassage();
            }
        }

        function nextPassage() {
            if (currentIndex < passages.length - 1) {
                currentIndex++;
                renderPassage();
            } else {
                alert('🎉 Congratulations! You have completed all passages. More coming soon!');
            }
        }

        renderPassage();
    </script>
</body>
</html>
