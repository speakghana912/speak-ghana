<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Picture ID Quiz | Speak Ghana</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f2b2a, #1f7a6e);
            min-height: 100vh;
            padding: 2rem;
        }
        .quiz-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 { color: #D4A373; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
        .progress-bar {
            background: #f0f0f0;
            border-radius: 20px;
            height: 8px;
            margin: 1rem 0;
            overflow: hidden;
        }
        .progress-fill { background: #D4A373; height: 100%; width: 0%; transition: width 0.3s; }
        .quiz-image {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 20px;
            margin: 1rem auto;
            display: block;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin: 2rem 0;
        }
        .option-btn {
            background: white;
            border: 2px solid #D4A373;
            padding: 1rem;
            border-radius: 60px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            padding-left: 1.5rem;
        }
        .option-btn:hover:not(:disabled) {
            background: #D4A373;
            color: white;
            transform: scale(1.02);
        }
        .option-btn.correct-answer {
            background: #2A9D8F;
            color: white;
            border-color: #2A9D8F;
        }
        .option-btn.wrong-answer {
            background: #E76F51;
            color: white;
            border-color: #E76F51;
        }
        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        .next-btn {
            background: #2A9D8F;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
            transition: all 0.3s;
        }
        .next-btn:hover:not(:disabled) {
            background: #1f7a6e;
            transform: translateY(-2px);
        }
        .next-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .score-display { text-align: center; margin-top: 1rem; font-size: 1.2rem; color: #D4A373; font-weight: bold; }
        .feedback { text-align: center; margin: 1rem 0; padding: 1rem; border-radius: 16px; font-weight: bold; }
        .feedback.correct { background: #d4edda; color: #155724; }
        .feedback.incorrect { background: #f8d7da; color: #721c24; }
        .hidden { display: none; }
        .result-box { text-align: center; padding: 2rem; }
        .result-emoji { font-size: 4rem; margin-bottom: 1rem; }
        .result-score { font-size: 2rem; font-weight: bold; color: #D4A373; margin: 1rem 0; }
        .result-message { color: #666; margin: 1rem 0; font-size: 1.1rem; }
        .restart-btn, .review-btn {
            background: #D4A373;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 1rem;
            margin-right: 0.5rem;
            transition: all 0.3s;
        }
        .restart-btn:hover, .review-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212,163,115,0.3);
        }
        .question-counter {
            text-align: center;
            color: #999;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }
        @media (max-width: 768px) {
            .quiz-container { padding: 1rem; }
            .quiz-image { width: 150px; height: 150px; }
            .option-btn { padding: 0.8rem; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <h1>🖼️ Picture ID Quiz</h1>
        <p style="color: #666; margin-bottom: 1rem;">Identify the Twi word for each picture</p>
        
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        
        <div id="quizContent">
            <div class="question-counter" id="questionCounter">Question 1 of 10</div>
            <img id="quizImage" class="quiz-image" src="" alt="Vocabulary">
            <div class="options" id="optionsContainer"></div>
            <div class="feedback hidden" id="feedback"></div>
            <button class="next-btn" id="nextBtn">Next Question →</button>
            <div class="score-display" id="scoreDisplay">Score: 0 / 0</div>
        </div>
        
        <div id="resultContent" class="hidden">
            <div class="result-box">
                <div class="result-emoji" id="resultEmoji">🏆</div>
                <div class="result-score" id="resultScore">0 / 0</div>
                <div class="result-message" id="resultMessage"></div>
                <div id="detailedResults" style="margin: 1rem 0; text-align: left; max-height: 300px; overflow-y: auto; border-top: 1px solid #eee; padding-top: 1rem;"></div>
                <button class="restart-btn" id="restartBtn">🔄 Try Again</button>
                <button class="review-btn" id="reviewBtn">📋 Review Wrong Answers</button>
                <button class="restart-btn" onclick="window.close()" style="background: #2A9D8F;">❌ Close</button>
            </div>
        </div>
    </div>

    <script>
        // ============ EXPANDED VOCABULARY WITH IMAGES (50+ WORDS) ============
        const vocabulary = [
            // Home
            { word: "efie", meaning: "house", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/efie.jpg" },
            { word: "ɛpono", meaning: "table", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/table.jpg" },
            { word: "mpoma", meaning: "window", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/window.jpg" },
            { word: "agua", meaning: "chair", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/chair.jpg" },
            { word: "mpa", meaning: "bed", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/bed.jpg" },
            { word: "nsuo", meaning: "water", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/water.jpg" },
            { word: "ogya", meaning: "fire", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/fire.jpg" },
            { word: "kanea", meaning: "light", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/light.jpg" },
            { word: "pono", meaning: "door", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/door.jpg" },
            // Family
            { word: "agya", meaning: "father", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/father.jpg" },
            { word: "ɛna", meaning: "mother", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/mother.jpg" },
            { word: "abaayewa", meaning: "girl", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/girl.jpg" },
            { word: "baamua", meaning: "boy", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/boy.jpg" },
            { word: "akwadaa", meaning: "child", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/child.jpg" },
            { word: "nana", meaning: "grandfather", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/gfather.jpg" },
            { word: "nanabaa", meaning: "grandmother", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/gmother.jpg" },
            // Food
            { word: "aduane", meaning: "food", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/food.jpg" },
            { word: "kwadu", meaning: "banana", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/banana.jpg" },
            { word: "ankaa", meaning: "orange", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/orange.jpg" },
            { word: "mango", meaning: "mango", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/mango.jpg" },
            { word: "aborɔbɛ", meaning: "pineapple", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/pineaple.jpg" },
            { word: "paya", meaning: "avocado", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/avocado.jpg" },
            { word: "bayere", meaning: "yam", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/yam.jpg" },
            { word: "aburo", meaning: "corn", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/aburo.jpg" },
            { word: "ɛmo", meaning: "rice", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/rice.jpg" },
            { word: "nsumunam", meaning: "fish", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/fish.jpg" },
            { word: "akokɔnam", meaning: "chicken", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/chicken.jpg" },
            // Colors (using colored shapes images)
            { word: "tuntum", meaning: "black", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/black.jpg" },
            { word: "bibire", meaning: "blue", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/blue.jpg" },
            { word: "ahabanmono", meaning: "green", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/green.jpg" },
            { word: "fitaa", meaning: "white", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/white.jpg" },
            { word: "akokɔsradeɛ", meaning: "yellow", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/yellow.jpg" },
            // Body Parts
            { word: "ani", meaning: "eye", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/eye.jpg" },
            { word: "nsa", meaning: "hand", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/hand.jpg" },
            { word: "ti", meaning: "head", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/head.jpg" },
            { word: "akoma", meaning: "heart", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/heart.jpg" },
            { word: "nan", meaning: "leg", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/leg.jpg" },
            { word: "ano", meaning: "mouth", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/mouth.jpg" },
            { word: "aso", meaning: "ear", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/ear.jpg" },
            // Animals
            { word: "anomaa", meaning: "bird", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/bird.jpg" },
            { word: "kraman", meaning: "dog", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/dog.jpg" },
            { word: "ɛsono", meaning: "elephant", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/elephant.jpg" },
            { word: "gyata", meaning: "lion", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/lion.jpg" },
            { word: "apɔnkye", meaning: "goat", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/goat.jpg" },
            // Nature
            { word: "awia", meaning: "sun", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/sun.jpg" },
            { word: "ɔsram", meaning: "moon", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/moon.jpg" },
            { word: "dua", meaning: "tree", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/tree.jpg" },
            { word: "nhwiren", meaning: "flower", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/flowers.jpg" },
            { word: "bepɔ", meaning: "mountain", image: "https://raw.githubusercontent.com/speakghana912/speak-ghana/main/self-paced/vocabs/mountain.jpg" }
        ];

        // Quiz variables
        let currentQuestions = [];
        let currentIndex = 0;
        let currentScore = 0;
        let selectedAnswer = null;
        let quizActive = true;
        let wrongAnswers = [];

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function generateQuestions(questionCount = 10) {
            const shuffled = shuffleArray([...vocabulary]);
            const selected = shuffled.slice(0, Math.min(questionCount, vocabulary.length));
            const newQuestions = [];
            
            for (let item of selected) {
                const otherWords = vocabulary.filter(v => v.word !== item.word).map(v => v.word);
                const uniqueWrong = [];
                const used = new Set([item.word]);
                
                while (uniqueWrong.length < 3 && otherWords.length) {
                    const random = otherWords[Math.floor(Math.random() * otherWords.length)];
                    if (!used.has(random)) {
                        uniqueWrong.push(random);
                        used.add(random);
                    }
                }
                
                // Fill with defaults if needed
                const defaults = ["efie", "agua", "nsuo", "agya", "ɛna", "kwadu", "awia", "dua"];
                while (uniqueWrong.length < 3) {
                    for (let d of defaults) {
                        if (!used.has(d) && uniqueWrong.length < 3) {
                            uniqueWrong.push(d);
                            used.add(d);
                        }
                    }
                }
                
                const options = [item.word, ...uniqueWrong];
                for (let i = options.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [options[i], options[j]] = [options[j], options[i]];
                }
                
                newQuestions.push({
                    correct: item.word,
                    meaning: item.meaning,
                    options: options,
                    image: item.image
                });
            }
            return newQuestions;
        }

        function displayQuestion() {
            if (!quizActive || currentIndex >= currentQuestions.length) {
                finishQuiz();
                return;
            }
            
            const q = currentQuestions[currentIndex];
            document.getElementById('quizImage').src = q.image;
            document.getElementById('quizImage').alt = q.meaning;
            document.getElementById('scoreDisplay').innerHTML = `Score: ${currentScore} / ${currentQuestions.length}`;
            document.getElementById('questionCounter').innerHTML = `Question ${currentIndex + 1} of ${currentQuestions.length}`;
            
            const progressPercent = (currentIndex / currentQuestions.length) * 100;
            document.getElementById('progressFill').style.width = `${progressPercent}%`;
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = opt;
                btn.onclick = () => selectAnswer(opt, btn);
                optionsContainer.appendChild(btn);
            });
            
            document.getElementById('feedback').classList.add('hidden');
            document.getElementById('nextBtn').disabled = false;
            selectedAnswer = null;
        }

        function selectAnswer(answer, btnElement) {
            if (selectedAnswer !== null) return;
            selectedAnswer = answer;
            
            const q = currentQuestions[currentIndex];
            const isCorrect = (answer === q.correct);
            
            const feedbackDiv = document.getElementById('feedback');
            const allOptions = document.querySelectorAll('.option-btn');
            
            if (isCorrect) {
                currentScore++;
                feedbackDiv.className = 'feedback correct';
                feedbackDiv.innerHTML = '✅ Correct! Well done!';
                feedbackDiv.classList.remove('hidden');
                btnElement.classList.add('correct-answer');
            } else {
                feedbackDiv.className = 'feedback incorrect';
                feedbackDiv.innerHTML = `❌ Incorrect! The correct answer is "${q.correct}" (${q.meaning})`;
                feedbackDiv.classList.remove('hidden');
                btnElement.classList.add('wrong-answer');
                
                // Highlight correct answer
                allOptions.forEach(btn => {
                    if (btn.innerHTML === q.correct) {
                        btn.classList.add('correct-answer');
                    }
                });
                
                // Store wrong answer for review
                wrongAnswers.push({
                    word: q.correct,
                    meaning: q.meaning,
                    yourAnswer: answer,
                    image: q.image
                });
            }
            
            allOptions.forEach(btn => { btn.disabled = true; });
            document.getElementById('scoreDisplay').innerHTML = `Score: ${currentScore} / ${currentQuestions.length}`;
        }

        function nextQuestion() {
            if (selectedAnswer === null) {
                alert('Please select an answer before continuing!');
                return;
            }
            
            currentIndex++;
            
            if (currentIndex < currentQuestions.length) {
                displayQuestion();
            } else {
                finishQuiz();
            }
        }

        function finishQuiz() {
            quizActive = false;
            document.getElementById('quizContent').classList.add('hidden');
            document.getElementById('resultContent').classList.remove('hidden');
            
            const percentage = (currentScore / currentQuestions.length) * 100;
            let emoji = '', message = '';
            
            if (percentage >= 90) { emoji = '🏆'; message = 'Excellent! You know your vocabulary!'; }
            else if (percentage >= 70) { emoji = '🎉'; message = 'Great job! Keep practicing!'; }
            else if (percentage >= 50) { emoji = '👍'; message = 'Good effort! Review the pictures you missed.'; }
            else { emoji = '📚'; message = 'Keep studying the picture gallery and try again!'; }
            
            document.getElementById('resultEmoji').innerHTML = emoji;
            document.getElementById('resultScore').innerHTML = `${currentScore} / ${currentQuestions.length}`;
            document.getElementById('resultMessage').innerHTML = message;
            
            // Show detailed results
            const detailedDiv = document.getElementById('detailedResults');
            if (wrongAnswers.length > 0) {
                let wrongHtml = '<strong>📝 Pictures to Review:</strong><br><br>';
                wrongAnswers.forEach((item, idx) => {
                    wrongHtml += `<div style="background: #fef5f2; padding: 0.8rem; margin-bottom: 0.5rem; border-radius: 12px; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;">
                        <div style="flex: 1;">
                            <strong>${idx + 1}. Image:</strong><br>
                            <img src="${item.image}" style="width: 50px; height: 50px; object-fit: cover; border-radius: 10px; margin-top: 0.3rem;">
                        </div>
                        <div style="flex: 2;">
                            <strong>Correct word:</strong> "${item.word}" (${item.meaning})<br>
                            <strong>Your answer:</strong> "${item.yourAnswer}"
                        </div>
                    </div>`;
                });
                detailedDiv.innerHTML = wrongHtml;
            } else {
                detailedDiv.innerHTML = '<div style="text-align: center; color: #2A9D8F;">🎉 Perfect! No pictures to review!</div>';
            }
            
            // Add XP if parent window has addXP function
            try {
                if (window.opener && window.opener.addXP) {
                    const xpEarned = currentScore * 10;
                    window.opener.addXP(xpEarned, 'Picture Quiz completed!');
                }
            } catch(e) { console.log('XP not added'); }
        }

        function restartQuiz() {
            currentQuestions = generateQuestions(10);
            currentIndex = 0;
            currentScore = 0;
            selectedAnswer = null;
            quizActive = true;
            wrongAnswers = [];
            document.getElementById('quizContent').classList.remove('hidden');
            document.getElementById('resultContent').classList.add('hidden');
            displayQuestion();
        }

        function reviewWrongAnswers() {
            if (wrongAnswers.length === 0) return;
            
            // Create a review quiz with only wrong answers
            const reviewQuestions = wrongAnswers.map(item => {
                const otherWords = vocabulary.filter(v => v.word !== item.word).map(v => v.word);
                const uniqueWrong = [];
                const used = new Set([item.word]);
                
                while (uniqueWrong.length < 3 && otherWords.length) {
                    const random = otherWords[Math.floor(Math.random() * otherWords.length)];
                    if (!used.has(random)) {
                        uniqueWrong.push(random);
                        used.add(random);
                    }
                }
                
                const defaults = ["efie", "agua", "nsuo", "agya", "ɛna", "kwadu"];
                while (uniqueWrong.length < 3) {
                    for (let d of defaults) {
                        if (!used.has(d) && uniqueWrong.length < 3) {
                            uniqueWrong.push(d);
                            used.add(d);
                        }
                    }
                }
                
                const options = [item.word, ...uniqueWrong];
                for (let i = options.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [options[i], options[j]] = [options[j], options[i]];
                }
                
                return {
                    correct: item.word,
                    meaning: item.meaning,
                    options: options,
                    image: item.image
                };
            });
            
            currentQuestions = reviewQuestions;
            currentIndex = 0;
            currentScore = 0;
            selectedAnswer = null;
            quizActive = true;
            wrongAnswers = [];
            document.getElementById('quizContent').classList.remove('hidden');
            document.getElementById('resultContent').classList.add('hidden');
            displayQuestion();
        }

        // Initialize quiz
        currentQuestions = generateQuestions(10);
        
        // Attach event listeners
        document.getElementById('nextBtn').onclick = () => nextQuestion();
        document.getElementById('restartBtn').onclick = () => restartQuiz();
        document.getElementById('reviewBtn').onclick = () => reviewWrongAnswers();
        
        displayQuestion();
    </script>
</body>
</html>
