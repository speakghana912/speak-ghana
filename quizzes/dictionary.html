    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;

            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 { color: #2A9D8F; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
        .stats {
            background: #e8f4f1;
            border-radius: 16px;
            padding: 0.8rem 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .stats span { font-weight: bold; color: #2A9D8F; }
        .search-box {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 50px;
            margin-bottom: 1rem;
            font-size: 1rem;
        }
        .search-box:focus { outline: none; border-color: #2A9D8F; }
        .filter-btns {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .filter-btn {
            background: #E76F51;
            color: white;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;
        }
        .filter-btn.active { background: #2A9D8F; }
        .filter-btn.all { background: #2A9D8F; }
        .table-wrapper {
            overflow-x: auto;
            max-height: 500px;
            overflow-y: auto;
            border-radius: 16px;
            border: 1px solid #eee;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        th {
            position: sticky;
            top: 0;
            background: #2A9D8F;
            color: white;
            padding: 0.8rem;
            text-align: left;
            z-index: 10;
        }
        td {
            padding: 0.6rem 0.8rem;
            border-bottom: 1px solid #eee;
        }
        .dictionary-row:hover {
            background: #f5f5f5;
            cursor: pointer;
        }
        .twi-word { font-weight: bold; color: #2A9D8F; }
        .close-btn {
            background: #D4A373;
            color: white;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 1rem;
        }
        .close-btn:hover { background: #c49a6c; }
        .letter-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            margin-bottom: 1rem;
            justify-content: center;
        }
        .letter-btn {
            background: #f0f0f0;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .letter-btn:hover { background: #2A9D8F; color: white; }
        .letter-btn.active { background: #2A9D8F; color: white; }
        @media (max-width: 768px) {
            .container { padding: 1rem; }
            th, td { padding: 0.4rem; font-size: 0.75rem; }
            .letter-btn { width: 30px; height: 30px; font-size: 0.7rem; }

            pronouns: "🔤", adverbs: "⚡", adjectives: "🎨",

            verbs: "🏃", home: "🏠", family: "👨‍👩‍👧", food: "🍎",

            days: "📅", months: "🗓️", clothes: "👗", health: "🏥",
            school: "🎒", work: "💼", transport: "🚗", money: "💰",
            religion: "🙏", emotions: "❤️", directions: "🧭", phrases: "💬",
            tense: "🔧", negation: "🚫", places: "🌍", professions: "👨‍⚕️",

        function buildLetterNav() {
            const nav = document.getElementById('letterNav');
            nav.innerHTML = '<button class="letter-btn active" data-letter="">All</button>';
            letters.forEach(letter => {
                const btn = document.createElement('button');
                btn.className = 'letter-btn';
                btn.textContent = letter;
                btn.setAttribute('data-letter', letter);
                btn.onclick = () => filterByLetter(letter);
                nav.appendChild(btn);
            });
            nav.querySelector('[data-letter=""]').onclick = () => filterByLetter("");
        }

        function filterByLetter(letter) {
            currentLetter = letter;
            document.querySelectorAll('.letter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-letter') === letter) btn.classList.add('active');
            });
            renderDictionary();
        }

        function renderDictionary() {
            let filtered = [...dictionary];

            if (currentCategory !== "all") {
                filtered = filtered.filter(item => item.category === currentCategory);
            }
            if (currentSearch) {
                const s = currentSearch.toLowerCase();
                filtered = filtered.filter(item =>
                    item.twi.toLowerCase().includes(s) ||
                    item.english.toLowerCase().includes(s)
                );
            }
            if (currentLetter) {
                filtered = filtered.filter(item =>
                    item.twi.charAt(0).toUpperCase() === currentLetter ||
                    item.twi.charAt(0) === currentLetter.toLowerCase()
                );
            }

            filtered.sort((a, b) => a.twi.localeCompare(b.twi));

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            filtered.forEach((item, index) => {
                const row = tbody.insertRow();
                row.className = 'dictionary-row';
                row.onclick = () => playAudio(item.twi);
                row.insertCell(0).innerHTML = index + 1;
                row.insertCell(1).innerHTML = `<span class="twi-word">${item.twi}</span>`;
                row.insertCell(2).innerHTML = item.english;
                const icon = catIcons[item.category] || "📚";
                row.insertCell(3).innerHTML = `${icon} ${item.category}`;
            });

            document.getElementById('wordCount').innerHTML = filtered.length;
        }

        function playAudio(twiWord) {
            const notification = document.createElement('div');
            notification.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2A9D8F;color:white;padding:8px 16px;border-radius:50px;z-index:10000;font-size:14px;';
            notification.innerHTML = `🔊 ${twiWord}`;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 1500);
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            currentSearch = e.target.value;
            currentLetter = "";
            document.querySelectorAll('.letter-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector('.letter-btn[data-letter=""]').classList.add('active');
            renderDictionary();
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.getAttribute('data-cat');
                renderDictionary();
            });
        });

        buildLetterNav();
        renderDictionary();
    </script>
