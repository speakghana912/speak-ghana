<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiple Choice Quiz | Speak Ghana</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f2b2a, #1f7a6e);
            min-height: 100vh;
            padding: 2rem;
        }
        .quiz-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 { color: #2A9D8F; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
        .progress-bar {
            background: #f0f0f0;
            border-radius: 20px;
            height: 8px;
            margin: 1rem 0;
            overflow: hidden;
        }
        .progress-fill {
            background: #2A9D8F;
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }
        .question-text {
            font-size: 1.8rem;
            font-weight: bold;
            color: #2A9D8F;
            text-align: center;
            margin: 1.5rem 0;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin: 2rem 0;
        }
        .option-btn {
            background: white;
            border: 2px solid #2A9D8F;
            padding: 1rem;
            border-radius: 60px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            padding-left: 1.5rem;
        }
        .option-btn:hover {
            background: #2A9D8F;
            color: white;
            transform: scale(1.02);
        }
        .next-btn {
            background: #E76F51;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
        }
        .next-btn:hover { background: #c95a3e; }
        .score-display {
            text-align: center;
            margin-top: 1rem;
            font-size: 1.2rem;
            color: #2A9D8F;
            font-weight: bold;
        }
        .feedback {
            text-align: center;
            margin: 1rem 0;
            padding: 1rem;
            border-radius: 16px;
            font-weight: bold;
        }
        .feedback.correct { background: #d4edda; color: #155724; }
        .feedback.incorrect { background: #f8d7da; color: #721c24; }
        .hidden { display: none; }
        .result-box {
            text-align: center;
            padding: 2rem;
        }
        .result-emoji { font-size: 4rem; margin-bottom: 1rem; }
        .result-score { font-size: 2rem; font-weight: bold; color: #2A9D8F; margin: 1rem 0; }
        .restart-btn {
            background: #2A9D8F;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <h1>📖 Multiple Choice Quiz</h1>
        <p style="color: #666; margin-bottom: 1rem;">Select the correct meaning of each Twi word</p>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <div id="quizContent">
            <div class="question-text" id="questionText">Loading...</div>
            <div class="options" id="optionsContainer"></div>
            <div class="feedback hidden" id="feedback"></div>
            <button class="next-btn" id="nextBtn">Next Question →</button>
            <div class="score-display" id="scoreDisplay">Score: 0 / 0</div>
        </div>
        
        <div id="resultContent" class="hidden">
            <div class="result-box">
                <div class="result-emoji" id="resultEmoji">🏆</div>
                <div class="result-score" id="resultScore">0 / 0</div>
                <p id="resultMessage" style="color: #666; margin: 1rem 0;"></p>
                <button class="restart-btn" id="restartBtn">🔄 Try Again</button>
                <button class="restart-btn" onclick="window.close()" style="background: #D4A373; margin-left: 1rem;">❌ Close</button>
            </div>
        </div>
    </div>

    <script>
        // Make all functions globally accessible
        window.currentQuestions = [];
        window.currentIndex = 0;
        window.currentScore = 0;
        window.selectedAnswer = null;
        window.quizActive = true;

        const vocabulary = [
            { word: "efie", meaning: "house" }, { word: "ɛpono", meaning: "table" }, { word: "mpoma", meaning: "window" },
            { word: "agua", meaning: "chair" }, { word: "mpa", meaning: "bed" }, { word: "nsuo", meaning: "water" },
            { word: "ogya", meaning: "fire" }, { word: "kanea", meaning: "light" }, { word: "pono", meaning: "door" },
            { word: "agya", meaning: "father" }, { word: "ɛna", meaning: "mother" }, { word: "abaayewa", meaning: "girl" },
            { word: "baamua", meaning: "boy" }, { word: "akwadaa", meaning: "child" }, { word: "nana", meaning: "grandfather" },
            { word: "nanabaa", meaning: "grandmother" }, { word: "nua", meaning: "sibling" }, { word: "okunu", meaning: "husband" },
            { word: "yere", meaning: "wife" }, { word: "aduane", meaning: "food" }, { word: "kwadu", meaning: "banana" },
            { word: "ankaa", meaning: "orange" }, { word: "mango", meaning: "mango" }, { word: "aborɔbɛ", meaning: "pineapple" },
            { word: "paya", meaning: "avocado" }, { word: "bayere", meaning: "yam" }, { word: "aburo", meaning: "corn" },
            { word: "ɛmo", meaning: "rice" }, { word: "nsumunam", meaning: "fish" }, { word: "akokɔnam", meaning: "chicken" },
            { word: "tuntum", meaning: "black" }, { word: "bibire", meaning: "blue" }, { word: "dododeɛ", meaning: "brown" },
            { word: "ahabanmono", meaning: "green" }, { word: "memen", meaning: "pink" }, { word: "beredum", meaning: "purple" },
            { word: "fitaa", meaning: "white" }, { word: "akokɔsradeɛ", meaning: "yellow" }, { word: "ani", meaning: "eye" },
            { word: "nsa", meaning: "hand" }, { word: "ti", meaning: "head" }, { word: "akoma", meaning: "heart" },
            { word: "nan", meaning: "leg" }, { word: "ano", meaning: "mouth" }, { word: "anomaa", meaning: "bird" },
            { word: "kraman", meaning: "dog" }, { word: "ɛsono", meaning: "elephant" }, { word: "gyata", meaning: "lion" },
            { word: "awia", meaning: "sun" }, { word: "ɔsram", meaning: "moon" }, { word: "dua", meaning: "tree" }
        ];

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function generateQuestions() {
            const shuffled = shuffleArray([...vocabulary]);
            const selected = shuffled.slice(0, 10);
            const newQuestions = [];
            
            for (let item of selected) {
                const otherMeanings = vocabulary.filter(v => v.word !== item.word).map(v => v.meaning);
                const wrongOptions = [];
                const used = [item.meaning];
                
                while (wrongOptions.length < 3 && otherMeanings.length) {
                    const random = otherMeanings[Math.floor(Math.random() * otherMeanings.length)];
                    if (!used.includes(random)) {
                        wrongOptions.push(random);
                        used.push(random);
                    }
                }
                
                const options = [item.meaning, ...wrongOptions];
                for (let i = options.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [options[i], options[j]] = [options[j], options[i]];
                }
                
                newQuestions.push({
                    word: item.word,
                    correct: item.meaning,
                    options: options
                });
            }
            return newQuestions;
        }

        function displayQuestion() {
            if (!window.quizActive) return;
            const q = window.currentQuestions[window.currentIndex];
            document.getElementById('questionText').innerHTML = `"${q.word}"`;
            document.getElementById('scoreDisplay').innerHTML = `Score: ${window.currentScore} / ${window.currentQuestions.length}`;
            
            const progressPercent = (window.currentIndex / window.currentQuestions.length) * 100;
            document.getElementById('progressFill').style.width = `${progressPercent}%`;
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = opt;
                btn.onclick = () => selectAnswer(opt, btn);
                optionsContainer.appendChild(btn);
            });
            
            document.getElementById('feedback').classList.add('hidden');
            document.getElementById('nextBtn').disabled = false;
            window.selectedAnswer = null;
        }

        function selectAnswer(answer, btnElement) {
            if (window.selectedAnswer !== null) return;
            window.selectedAnswer = answer;
            
            const q = window.currentQuestions[window.currentIndex];
            const isCorrect = (answer === q.correct);
            
            const feedbackDiv = document.getElementById('feedback');
            if (isCorrect) {
                window.currentScore++;
                feedbackDiv.className = 'feedback correct';
                feedbackDiv.innerHTML = '✅ Correct! Well done!';
                feedbackDiv.classList.remove('hidden');
            } else {
                feedbackDiv.className = 'feedback incorrect';
                feedbackDiv.innerHTML = `❌ Incorrect! The correct answer is "${q.correct}"`;
                feedbackDiv.classList.remove('hidden');
            }
            
            const allOptions = document.querySelectorAll('.option-btn');
            allOptions.forEach(btn => { btn.style.pointerEvents = 'none'; });
            
            if (isCorrect) btnElement.style.background = '#2A9D8F';
            else btnElement.style.background = '#E76F51';
            
            document.getElementById('scoreDisplay').innerHTML = `Score: ${window.currentScore} / ${window.currentQuestions.length}`;
        }

        window.nextQuestion = function() {
            if (window.selectedAnswer === null && window.currentIndex < window.currentQuestions.length - 1) {
                alert('Please select an answer before continuing!');
                return;
            }
            
            if (window.selectedAnswer === null && window.currentIndex === window.currentQuestions.length - 1) {
                finishQuiz();
                return;
            }
            
            window.currentIndex++;
            
            if (window.currentIndex < window.currentQuestions.length) {
                displayQuestion();
            } else {
                finishQuiz();
            }
        };

        function finishQuiz() {
            window.quizActive = false;
            document.getElementById('quizContent').classList.add('hidden');
            document.getElementById('resultContent').classList.remove('hidden');
            
            const percentage = (window.currentScore / window.currentQuestions.length) * 100;
            let emoji = '', message = '';
            
            if (percentage >= 90) { emoji = '🏆'; message = 'Excellent! You\'re a Twi master!'; }
            else if (percentage >= 70) { emoji = '🎉'; message = 'Great job! Keep practicing!'; }
            else if (percentage >= 50) { emoji = '👍'; message = 'Good effort! Review and try again.'; }
            else { emoji = '📚'; message = 'Keep studying and try again!'; }
            
            document.getElementById('resultEmoji').innerHTML = emoji;
            document.getElementById('resultScore').innerHTML = `${window.currentScore} / ${window.currentQuestions.length}`;
            document.getElementById('resultMessage').innerHTML = message;
        }

        window.restartQuiz = function() {
            window.currentQuestions = generateQuestions();
            window.currentIndex = 0;
            window.currentScore = 0;
            window.selectedAnswer = null;
            window.quizActive = true;
            document.getElementById('quizContent').classList.remove('hidden');
            document.getElementById('resultContent').classList.add('hidden');
            displayQuestion();
        };

        // Initialize quiz
        window.currentQuestions = generateQuestions();
        window.currentIndex = 0;
        window.currentScore = 0;
        window.quizActive = true;
        displayQuestion();
        
        // Attach event listeners
        document.getElementById('nextBtn').onclick = () => window.nextQuestion();
        document.getElementById('restartBtn').onclick = () => window.restartQuiz();
    </script>
</body>
</html>
